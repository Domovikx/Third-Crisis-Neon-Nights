# Dialogues (path_id=2568)

- text: "See? Easy!"
  translation: "Видишь? Легко!"

- text: "I thought you said it wouldn't be easy."
  translation: "Я думала, это ты сказала, что будет непросто."

- text: "You were the one that said that, darling. I just said you were astute!"
  translation: "Это ты так сказала, дорогая. Я лишь назвала тебя проницательной!"

- text: "Now bring me my concoction~"
  translation: "А теперь неси моё зелье~"

