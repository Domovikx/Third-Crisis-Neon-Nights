# Dialogues (path_id=73079)

- text: "How long have you had those glasses now?"
  translation: "Как давно у тебя эти очки?"

- text: "Oh- years at least. Daddy got 'em for me way back when."
  translation: "О- годы, как минимум. Папочка купил их мне давным-давно."

- text: "They suit you!"
  translation: "Они тебе идут!"

