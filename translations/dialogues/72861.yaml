# Dialogues (path_id=72861)

- text: "Have you been sleeping alright lately?"
  translation: "Ты в последнее время нормально спишь?"

- text: "Sleep's always been a bit up and down for me..."
  translation: "Со сном у меня всегда было нестабильно..."

- text: "Awwh, how comes?"
  translation: "Оуу, почему?"
  speaker: "Zoey"

- text: "Dreams just... Aren't really my thing."
  translation: "Сны просто... Не моё."

- text: "Yeah... Mine neither."
  translation: "Да... Мои тоже."
  speaker: "Zoey"

- text: "Vr helps... Like being someone else. Not... Me."
  translation: "VR помогает... Быть кем-то другим. Не... Собой."

- text: "It helps with the nightmares?"
  translation: "Это помогает с кошмарами?"
  speaker: "Zoey"

- text: "Unlike the pills, yeah..."
  translation: "В отличие от таблеток, да..."

- text: "Do you fall asleep while in vr?"
  translation: "Ты засыпаешь в VR?"
  speaker: "Zoey"

- text: "Awkward exhale"
  translation: "Неловкий выдох"

- text: "Sorry-...! Didn't mean to pry."
  translation: "Прости-...! Не хотела лезть не в своё дело."
  speaker: "Zoey"

- text: "No, I-... It's fine."
  translation: "Нет, я-... Всё в порядке."

