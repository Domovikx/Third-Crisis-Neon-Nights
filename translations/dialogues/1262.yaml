# Dialogues (path_id=1262)

- text: "That should be all of them."
  translation: "Ну вот, с этими всё."

- text: "Yeah, I see! Wow, you really saved my synthetic bacon. Hey, whatever you girls want, you can have it. On the house."
  translation: "Да, вижу! Ого, вы и правда спасли мою синтетическую шкуру. Слушайте, берите всё что хотите, девчонки. За мой счёт."

- text: "Wh- Really? I mea- You don't have to-"
  translation: "Ч-что? Правда? Я имею в- Не стоит-"

- text: "That sounds great! We were planning to have a premium for two."
  translation: "Звучит отлично! Мы как раз хотели взять премиум на двоих."

- text: "Anything for my two heroes. The helper bots will take care of you. Drinks are in the corner."
  translation: "Для моих героинь — всё что угодно. Боты-помощники о вас позаботятся. Напитки — в углу."

- text: "W-Wait... What's premium?"
  translation: "П-погодите... Что значит «премиум»?"

- text: "Drinks, nails, and a massage of course!"
  translation: "Напитки, маникюр и массаж, конечно же!"

- text: "Oh- wow."
  translation: "Ого-о..."

- text: "Have fun, ladies, and welcome to Hello Gorgeous! I'm Max, if you need anything, just come straight to me, lovelies."
  translation: "Веселитесь, леди, и добро пожаловать в Hello Gorgeous! Я Макс, если что-то понадобится — обращайтесь прямо ко мне, красавицы."

- text: "Thank you~!"
  translation: "Спасибо~!"

