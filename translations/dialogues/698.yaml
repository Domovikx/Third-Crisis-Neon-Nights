# Dialogues (path_id=698)

- text: "Do you like cooking?"
  translation: "Ты любишь готовить?"
  speaker: "Zoey"

- text: "Wish I didn't have to. Not exactly my... Style."
  translation: "Хотела бы не готовить. Не совсем мой... стиль."
  speaker: "Leona"

- text: "Then why do it?"
  translation: "Тогда зачем?"
  speaker: "Zoey"

- text: "Things just aren't what they used to be."
  translation: "Всё уже не так, как раньше."
  speaker: "Leona"

- text: "Right. Maybe you should make Lio cook for you!"
  translation: "Понятно. Может, заставишь Лио готовить для тебя!"
  speaker: "Zoey"

- text: "Cooking may not exactly be my style, but at least it's edible. Unlike whatever he eats whenever he orders his junk."
  translation: "Готовка, может, и не мой стиль, но это хотя бы съедобно. В отличие от того, что он ест, когда заказывает свой мусор."
  speaker: "Leona"

- text: "Right... Yeah, I bet."
  translation: "Понятно... Да, представляю."
  speaker: "Zoey"

