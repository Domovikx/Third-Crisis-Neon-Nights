# Dialogues (path_id=1255)

- text: "Wh- Really? I mea- You don't have to-"
  translation: "Ч-что? Правда? Я имею в виду... Вы не обязаны-"

- text: "That sounds great! We were planning to have a premium for two."
  translation: "Звучит отлично! Мы как раз планировали премиум на двоих."

- text: "Anything for my two heroes. The helper bots will take care of you. Drinks are in the corner."
  translation: "Всё, что угодно для моих героинь. Боты-помощники о вас позаботятся. Напитки в углу."

- text: "W-Wait... What's premium?"
  translation: "П-Погодите... Что такое премиум?"

- text: "Drinks, nails, and a massage of course!"
  translation: "Напитки, маникюр и массаж, конечно же!"

- text: "Oh- wow."
  translation: "Ого..."

- text: "Have fun, ladies!"
  translation: "Веселитесь, леди!"

- text: "Thank you~!"
  translation: "Спасибо~!"

