# Dialogues (path_id=2604)

- text: "Maybe you'll have to save up for a new model?"
  translation: "Может, придётся копить на новую модель?"
  speaker: "Zoey"

- text: "Are you fucking kidding me?!"
  translation: "Ты, блядь, издеваешься?!"

- text: "It'd take me fucking months of work to afford a new model."
  translation: "Мне понадобятся чёртовы месяцы работы, чтобы позволить себе новую модель."

- text: "Uh... Sorry, Jaime. I didn't mean to offend."
  translation: "Эм... Прости, Джейми. Я не хотела тебя задеть."

- text: "No, no... Shit. It's my fault, I... I shouldn't snap at you. Not you."
  translation: "Нет-нет... Чёрт. Это моя вина, я... я не должна была на тебя срываться. Не на тебя."

- text: "I should've stopped this VR shit a long time ago. Brain burn is... You don't usually come back from that."
  translation: "Мне давно нужно было завязать с этим VR-дерьмом. Ожог мозга — это... от такого обычно не оправляются."

- text: "...Thanks, by the way. For what you did before..."
  translation: "...Спасибо, кстати. За то, что ты тогда сделала..."

- text: "I'm just happy you're okay."
  translation: "Я просто рада, что с тобой всё в порядке."

