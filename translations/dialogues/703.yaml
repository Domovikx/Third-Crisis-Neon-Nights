# Dialogues (path_id=703)

- text: "This is the door you're looking for."
  translation: "Это та дверь, которую ты ищешь."
  speaker: "Leona"

- text: "Oh! I thought it was a closet."
  translation: "О! Я думала, это шкаф."
  speaker: "Zoey"

- text: "Working as intended then, heh."
  translation: "Значит, работает как задумано, хех."
  speaker: "Leona"

- text: "Right. Secret door. Of course."
  translation: "Точно. Секретная дверь. Конечно."
  speaker: "Zoey"

- text: "And you don't know how to open it?"
  translation: "И ты не знаешь, как её открыть?"
  speaker: "Zoey"

- text: "No, but you seem like a smart girl. I'm sure you'll figure it out."
  translation: "Нет, но ты кажешься умной девочкой. Уверена, ты разберёшься."
  speaker: "Leona"

- text: "Heh...! I'll try my best."
  translation: "Хех...! Я постараюсь."
  speaker: "Zoey"

