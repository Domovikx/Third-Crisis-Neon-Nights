# Dialogues (path_id=2609)

- text: "We're back."
  translation: "Мы вернулись."
  speaker: "Zoey"

- text: "Just in time. My cigarette's done."
  translation: "Вовремя. Сигарета догорела."

- text: "We're gonna find you some new hobbies, Jaime."
  translation: "Найдём тебе новые увлечения, Джейми."

- text: "I don't know, man. Don't think I'm worth the trouble."
  translation: "Не знаю, мужик. Не думаю, что я стою того."

- text: "Yes, you are."
  translation: "Стоишь."

- text: "And next time you'll help me think of something fun we can do together."
  translation: "А в следующий раз подкинешь идею, чем нам заняться вместе."

- text: "Ugh... Alright. I'll try."
  translation: "Эх... Ладно. Попробую."

- text: "That's all I ask. See you later, Jaime."
  translation: "И всё, что я прошу. Увидимся, Джейми."
  speaker: "Zoey"

- text: "See ya, Zoey."
  translation: "Увидимся, Зои."

