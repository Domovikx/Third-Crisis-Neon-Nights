# Dialogues (path_id=1250)

- text: "Bunch of assholes. Those enforcers will take any opportunity to be dickheads to people, and they just have to sit around and take it."
  translation: "Кучка мудаков. Эти силовики только и ждут повода насрать людям, а им приходится сидеть и терпеть."

- text: "This is all my fault... The lockdown... Waiting... Ugh..."
  translation: "Это всё моя вина... Локдаун... Ожидание... Угх..."

- text: "Oh Z..."
  translation: "О, З..."

- text: "I'm gonna see if I can help."
  translation: "Я попробую помочь."

