# Dialogues (path_id=568)

- text: "Enough light to make out her face?"
  translation: "Достаточно света, чтобы разглядеть её лицо?"

- text: "No, it's too dark."
  translation: "Нет, слишком темно."

- text: "Put a light on her whore face then."
  translation: "Тогда посвети на морду этой шлюхи."

- text: "On it."
  translation: "Сделаю."

