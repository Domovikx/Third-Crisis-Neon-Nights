# Dialogues (path_id=73071)

- text: "Love the outfit, Sarah."
  translation: "Обожаю твой наряд, Сара."

- text: "Aww, you do? I just tossed it together quick before I headed over."
  translation: "Оу, правда? Я просто накидала его наспех перед выходом."

- text: "And yet it still looks better than anything I could put together."
  translation: "И всё равно выглядит лучше, чем всё, что я могу собрать."

- text: "Oh, stop. You're gorgeous."
  translation: "Ой, перестань. Ты великолепна."

