# Dialogues (path_id=787)

- text: "(Am I really going to let him grope me for a tip? I'm just... here to be a waitress...)"
  translation: "(Неужели я правда позволю ему лапать меня за чаевые? Я же просто... официантка...)"

- text: "(Well... More money wouldn't hurt, really... )"
  translation: "(Ну... Лишние деньги не помешают, правда... )"
  speaker: "Zoey"

- text: "(And Rosie seems okay with it too... )"
  translation: "(И Рози, кажется, тоже не против... )"
  speaker: "Zoey"

