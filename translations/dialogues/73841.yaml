# Dialogues (path_id=73841)

- text: "Alright, I found the signal. But it's coming from... huh... From right under you actually."
  translation: "Ладно, я нашёл сигнал. Но он идёт от... хм... Прямо из-под тебя."

- text: "Under me? You mean-"
  translation: "Подо мной? Ты хочешь сказать-"

- text: "... Yeah. You were sitting on it the whole time."
  translation: "... Ага. Ты сидела на нём всё это время."

- text: "Oh my- You're right- Let me just..."
  translation: "О боже- Ты прав- Дай-ка я..."

