# Dialogues (path_id=2608)

- text: "There's a lot of cool stuff to do."
  translation: "Здесь куча классных занятий."
  speaker: "Zoey"

- text: "Not in this reality. There's nothing for me here."
  translation: "Не в этой реальности. Здесь для меня ничего нет."

- text: "And I like spending time with you."
  translation: "И я люблю проводить время с тобой."
  speaker: "Zoey"

- text: "Guess I'm losing my edge."
  translation: "Похоже, я теряю хватку."

- text: "You're really not as bad as you think."
  translation: "Ты правда не так плоха, как думаешь."

