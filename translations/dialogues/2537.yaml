# Dialogues (path_id=2537)

- text: "... Let's agree to never do something like this again."
  translation: "... Давай договоримся — больше так не делать."

- text: "Hah! Yeah not one of my greatest ideas."
  translation: "Ха! Да, идея была не из лучших."

- text: "It did work though."
  translation: "Зато сработало."

- text: "It did. Come on, hun. I'm pretty sure we get our clothes from the outside of the box. Let's get cleaned up."
  translation: "Сработало. Давай, милый. Я почти уверена, что наша одежда снаружи коробки. Пойдём приведём себя в порядок."

