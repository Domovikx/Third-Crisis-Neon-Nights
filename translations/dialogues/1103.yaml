# Dialogues (path_id=1103)

- text: "Hey Rosie... So this customer asked for a... Remote...?"
  translation: "Эй, Рози... Этот клиент попросил... пульт...?"
  speaker: "Zoey"

- text: "A remote? Oh this is going to be funnn..."
  translation: "Пульт? О, это будет ве-е-есело..."

- text: "Let me guess... Stoic bearded guy in the corner?"
  translation: "Дай угадаю... Суровый бородач в углу?"

- text: "I think that's him, yeah. You know him?"
  translation: "Кажется, это он. Знаешь его?"
  speaker: "Zoey"

- text: "Of course I know Rungar. He's a big tipper and that's not the only big thing about him, ehehe!"
  translation: "Конечно, я знаю Рунгара. Он щедро платит, и не только это у него большое, хе-хе!"

- text: "Ah- uh... R-right..."
  translation: "А-а... д-да..."

- text: "Take this one and bring it to him. He's... great... company. Tell him to call me any time."
  translation: "Возьми вот это и отнеси ему. Он... отличный... собеседник. Скажи ему — пусть звонит в любое время."
  rich_text: "Take this one and bring it to him. He's... <i>great</i>... company. Tell him to call me any time."
  rich_translation: "Возьми вот это и отнеси ему. Он... <i>отличный</i>... собеседник. Скажи ему — пусть звонит в любое время."

- text: "Okay, I'll tell him..."
  translation: "Хорошо, я передам..."
  speaker: "Zoey"

