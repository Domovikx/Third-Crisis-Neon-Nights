# Dialogues (path_id=2549)

- text: "... And that was how I broke up with my latest boytoy."
  translation: "... И вот как я рассталась с очередным мальчиком."

- text: "Oh my god, Sarah. You- Wait, I think the guards just went inside."
  translation: "О боже, Сара. Ты- Погоди, кажется, охранники только что вошли внутрь."

- text: "Wha-? But the door was locked!"
  translation: "Ч-что? Но дверь была заперта!"

- text: "Guess they got it open..."
  translation: "Видимо, они открыли..."

- text: "Let's get in there, Z."
  translation: "Давай зайдём туда, Зи."

- text: "I- Yeah... okay."
  translation: "Я- Да... хорошо."

