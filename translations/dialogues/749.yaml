# Dialogues (path_id=749)

- text: "Here's your drink, sir."
  translation: "Вот ваш напиток, сэр."
  speaker: "Zoey"

- text: "Looks perfect like always."
  translation: "Выглядит идеально, как всегда."
  speaker: "Varen"

- text: "Would that be all?"
  translation: "Это всё?"

- text: "Why don't you stay for a moment, hm? A little company would earn you ten of my fuckbucks."
  translation: "Почему бы тебе не задержаться на минутку, хм? Немного компании — и получишь десять моих факбаксов."
  speaker: "Varen"

- text: "Company...? Uhm..."
  translation: "Компания...? Эмм..."
  speaker: "Zoey"

