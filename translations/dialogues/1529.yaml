# Dialogues (path_id=1529)

- text: "Zoey! Oh my god did you hear about-"
  translation: "Зои! Боже, ты слышала о—"

- text: "Wait..! Am I hearing music? You're out having fun?! Tell me where!"
  translation: "Подожди..! Мне музыка слышится? Ты тусишь?! Скажи где!"
  rich_text: "Wait..! Am I hearing music? <b>You're</b> out having fun?! Tell me where!"
  rich_translation: "Подожди..! Мне музыка слышится? <b>Ты</b> тусишь?! Скажи где!"

- text: "Sarah, I'm working."
  translation: "Сара, я работаю."

- text: "No fun! We should party!"
  translation: "Скукота! Давай потусим!"

- text: "I couldn't if I wanted. I'm broke, remember?"
  translation: "Я бы не смогла, даже если б хотела. Я на мели, помнишь?"

- text: "But money is no problem! Daddy just gave me another check!"
  translation: "Да с деньгами нет проблем! Папочка только что дал мне очередной чек!"

- text: "Thanks hun, but I have to get my shit together myself. Wanna have my own cash, you know?"
  translation: "Спасибо, милая, но я должна сама разобраться. Хочу свои деньги, понимаешь?"

- text: "Awww.. Okayy.. But when you're done, give me a call, alright?"
  translation: "Нуу.. Ладненько.. Но как закончишь — позвони мне, ладно?"

