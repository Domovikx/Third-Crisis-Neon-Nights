# Dialogues (path_id=2136)

- text: "Wow, look at you, Zoey. Got a job at the Glowing Hole, huh?"
  translation: "Ого, посмотри на себя, Зои. Устроилась в Светящуюся дырку, да?"

- text: "No! I... I just uh- needed to wear the suit for... a job..."
  translation: "Нет! Я... я просто эээ- должна была надеть костюм для... работы..."

- text: "Well, yeah. You gotta wear that suit if you wanna work there."
  translation: "Ну да. Этот костюм надо носить, если хочешь там работать."

- text: "Not that kind of job!"
  translation: "Не та работа!"
  rich_text: "Not <b>that</b> kind of job!"
  rich_translation: "Не <b>та</b> работа!"

- text: "Heheh. Whatever you say, hun. You look like they treated you rough. Are you okay?"
  translation: "Хех. Как скажешь, милая. Выглядишь так, будто тебя там потрепали. Ты в порядке?"

- text: "I uh- fell... heh."
  translation: "Я эээ- упала... хех."

- text: "That's what they all say. Just be careful, hun. I don't wanna see you getting hurt."
  translation: "Так все говорят. Просто будь осторожна, милая. Не хочу, чтобы ты пострадала."

- text: "Thanks, Jaime..."
  translation: "Спасибо, Джейми..."

