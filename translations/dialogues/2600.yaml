# Dialogues (path_id=2600)

- text: "Hey, Zoey. It's Jaime."
  translation: "Эй, Зои. Это Джейми."

- text: "Jaime! How you doing?"
  translation: "Джейми! Как дела?"

- text: "I uh... Thanks. For the-"
  translation: "Я эм... Спасибо. За то-"

- text: "What? What is it this time?"
  translation: "Что? Что на этот раз?"

- text: "Sorry Zoey, gotta go. Landlady's on my ass again. Fucking Bitch."
  translation: "Прости, Зои, мне пора. Хозяйка снова насела на меня. Грёбаная сука."

- text: "Uh... Yeah. No problem, Jaime. Talk later?"
  translation: "Эм... Ага. Без проблем, Джейми. Поговорим позже?"
  speaker: "Zoey"

- text: "Sure, see you when you're back at the building. - Coming!"
  translation: "Конечно, увидимся, когда вернёшься в здание. — Иду!"

