# Dialogues (path_id=754)

- text: "Can you take a look at this headset for me?"
  translation: "Можешь взглянуть на этот шлем?"

- text: "Oh? It's an old BF-75d. These were everywhere before the crisis!"
  translation: "О? Это старый BF-75d. Такие были везде до кризиса!"

- text: "It's broken."
  translation: "Он сломан."

- text: "Understatement. It's a glorified paperweight. What even happened to this little guy?"
  translation: "Мягко сказано. Это просто пресс-папье. Что вообще случилось с этим малышом?"

- text: "I was hoping you could tell me."
  translation: "Я надеялась, ты скажешь мне."

- text: "Let me take a closer look."
  translation: "Дай-ка взгляну поближе."

