# Dialogues (path_id=754)

- text: "Hey! Aren't you the cutie that helped me clean up this room a while ago?"
  translation: "Эй! Ты же та милашка, что помогала мне с уборкой здесь недавно?"
  speaker: "Bunnyboy"

- text: "Huh? Oh, right! I did, heh!"
  translation: "А? О, точно! Помогала, хех!"
  speaker: "Zoey"

- text: "So you're our new waitress, hmm? I'm Simon by the way, eheh."
  translation: "Так ты наша новая официантка, хм? Я Саймон, кстати, эхех."

- text: "New waitress...? Um... well..."
  translation: "Новая официантка...? Эм... ну..."
  speaker: "Zoey"

- text: "Rosie seemed pretty happy having you around. Much more than the last one, eheh."
  translation: "Похоже, Рози была рада, что ты здесь. Куда больше, чем с предыдущей, эхех."

- text: "Yeahhh... Last one was kinda... well... let's just say she didn't follow the rules too closely."
  translation: "Ага-а... Предыдущая была такая... ну... скажем так, она не особо следовала правилам."

- text: "Anyways! Glad to have you on board, eheh! You're such a cutie!"
  translation: "Короче! Рад, что ты в команде, эхех! Ты просто прелесть!"

- text: "Heh...! Thanks."
  translation: "Хех...! Спасибо."
  speaker: "Zoey"

- text: "Also... don't I owe you something a little... sweaty for helping me clean up, hmm?~"
  translation: "И ещё... я же должен тебе кое-что... потненькое за помощь с уборкой, а?~"
  rich_text: "Also... don't I owe you something a little... <b>sweaty</b> for helping me clean up, hmm?~"
  rich_translation: "И ещё... я же должен тебе кое-что... <b>потненькое</b> за помощь с уборкой, а?~"

- text: "Can you take a look at this headset for me?"
  translation: "Можешь взглянуть на этот шлем?"

- text: "Oh? It's an old BF-75d. These were everywhere before the crisis!"
  translation: "О? Это старая BF-75d. Такие были повсюду до кризиса!"

- text: "It's broken."
  translation: "Она сломана."

- text: "Understatement. It's a glorified paperweight. What even happened to this little guy?"
  translation: "Сильное преуменьшение. Это пресс-папье, не иначе. Что вообще с ним стряслось?"

- text: "I was hoping you could tell me."
  translation: "Я надеялся, ты мне и расскажешь."

- text: "Let me take a closer look."
  translation: "Дай-ка взглянуть поближе."

