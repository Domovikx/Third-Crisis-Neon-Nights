# Dialogues (path_id=720)

- text: "And done! Eheh. Sorry you had to see that, Zoey."
  translation: "Готово! Эхех. Прости, что тебе пришлось это видеть, Зои."

- text: "Oh- heh. No worries. I've uh... seen worse!"
  translation: "О- хех. Не волнуйся. Я эм... видела и хуже!"

- text: "Sooo uh... What'd ya need me for?"
  translation: "Ита-ак... Зачем я тебе понадобился?"

- text: "Well... uh... I need to get a fake made of this little device I found."
  translation: "Ну... эм... Мне нужно сделать подделку этого маленького устройства, которое я нашла."

- text: "Ah yeah? This for a job of yours?"
  translation: "Ах да? Это для твоей работы?"

- text: "Something like that."
  translation: "Что-то вроде того."

- text: "Well give it here. Let's see it."
  translation: "Ну давай сюда. Посмотрим."

