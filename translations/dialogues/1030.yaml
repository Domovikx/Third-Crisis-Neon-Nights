# Dialogues (path_id=1030)

- text: "Ah-! Err... Hi!"
  translation: "А-! Эм... Привет!"

- text: "Well! I didn't know I was getting a two for one sale!"
  translation: "Ого! Не знал, что тут акция «два по цене одного»!"

- text: "Ah- Yeah! New. So new I uh- Guess I got the wrong room! Heh!"
  translation: "А- Да! Новенькая. Настолько новенькая, что я э- Кажется, ошиблась комнатой! Хех!"

- text: "Well new or not, you look absolutely gorgeous!"
  translation: "Новая или нет, выглядишь сногсшибательно!"

- text: "Ah- Heh, I- thanks?"
  translation: "А- Хех, я- спасибо?"

