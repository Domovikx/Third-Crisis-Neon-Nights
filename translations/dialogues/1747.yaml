# Dialogues (path_id=1747)

- text: "Did you see her?! Did you glimpse my Jasmine?!"
  translation: "Ты её видел?! Ты видел мою Жасмин?!"

- text: "Relax, pal. Yeah, she's up there. I even told her you were a secret admirer. So how about my money?"
  translation: "Расслабься, приятель. Да, она там, наверху. Я даже сказал ей, что у неё тайный поклонник. Ну, как насчёт моих денег?"

- text: "Wait! I must know! What did you say?"
  translation: "Погоди! Я должен знать! Что ты сказал?"

- text: "All I told her was that she's got a secret admirer."
  translation: "Я только сказал ей, что у неё есть тайный поклонник."

- text: "How did she react!?"
  translation: "Как она отреагировала!?"

- text: "She told me to tell you where to find her. Turns out she's right where you thought she was. Up there. Now... my money?"
  translation: "Она попросила передать тебе, где её найти. Оказалось, она там же, где ты и думал. Наверху. Так что... мои деньги?"

- text: "Wait! Let me think. Hmmm... I must capitalize on this fortunate turn of events! But how...?"
  translation: "Погоди! Дай подумать. Хм-м... Я должен воспользоваться этим счастливым случаем! Но как...?"

- text: "I don't know, maybe write her a -"
  translation: "Не знаю, может, напиши ей —"

- text: "WHY I'LL WRITE HER A LETTER!"
  translation: "ТОЧНО! Я НАПИШУ ЕЙ ПИСЬМО!"

- text: "Yeah, that."
  translation: "Ага, точно."

- text: "Only a genius such as myself could have come up with such an elaborate plan! Now... what to write..."
  translation: "Только гений вроде меня мог придумать столь изощрённый план! Итак... что же написать..."

