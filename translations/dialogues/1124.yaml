# Dialogues (path_id=1124)

- text: "Rosie..? Hmm.. I don't think so."
  translation: "Рози..? Хм.. Вряд ли."

- text: "Dear god, you're missing out big time, hun. Go say hi to her! She's the goddess behind the bar!"
  translation: "Господи, ты много теряешь, дорогуша. Подойди к ней! Она — богиня за стойкой!"

- text: "Goddess..? Alright."
  translation: "Богиня..? Ну ладно."

