# Dialogues (path_id=1142)

- text: "Let's see... Mhmm... Yes... Very good..."
  translation: "Так, посмотрим... Ммм... Да... Очень хорошо..."

- text: "You look so hot in this, hun. You'll be a customer magnet."
  translation: "Ты так горячо выглядишь в этом, милая. Будешь магнитом для клиентов."

- text: "Not much of a talker, hm? No need to be shy, you're in good hands, hun."
  translation: "Не из разговорчивых, да? Не нужно стесняться, ты в надёжных руках, милая."

- text: "R-right..-! Sorry, I-.. Mhm..!"
  translation: "Д-да..-! Прости, я-.. Мм..!"

- text: "Why don't we go upstairs and I show you how things work around here, hmm?"
  translation: "Почему бы нам не подняться наверх, и я покажу, как тут всё устроено, а?"

- text: "Y-yah..! Right!"
  translation: "Д-да..! Верно!"

