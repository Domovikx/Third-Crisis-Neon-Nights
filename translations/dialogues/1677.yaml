# Dialogues (path_id=1677)

- text: "You're more than welcome to stay! I won't say no to a pair of pretty breasts like yours."
  translation: "Рад буду, если останешься! Не откажусь от пары таких славных сисек."

- text: "Ah- Yeah, I uh- I really gotta get going though- Sorry!"
  translation: "А- Да, я э- Мне правда уже пора, прости!"

- text: "No need for sorry. I enjoyed the short sweet time I got to see ya."
  translation: "Не нужно извиняться. Мне было приятно провести с тобой это короткое, но сладкое время."

