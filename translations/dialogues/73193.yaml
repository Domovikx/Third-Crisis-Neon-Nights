# Dialogues (path_id=73193)

- text: "Used to save so much money dodging guards on the trains all the time, but now they check tickets at the door. Hard to travel now."
  translation: "Раньше столько экономила, убегая от охранников в поездах, а теперь они проверяют билеты у входа. Тяжело стало путешествовать."

