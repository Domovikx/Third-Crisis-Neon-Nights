# Dialogues (path_id=2099)

- text: "(Crap. It's my broker. Just stay cool, Zoey.)"
  translation: "(Вот чёрт. Это мой брокер. Спокойно, Зои.)"
  rich_text: "<i>(Crap. It's my broker. Just stay cool, Zoey.)</i>"
  rich_translation: "<i>(Вот чёрт. Это мой брокер. Спокойно, Зои.)</i>"

- text: "Ehh, hello?"
  translation: "Э-э, алло?"

- text: "You stirred the hornet's nest, Zoey. Do you at least have the suitcase? The Cartel is breathing down my neck."
  translation: "Ты разворошила осиное гнездо, Зои. Чемодан-то хоть у тебя? Картель мне дышит в затылок."

- text: "Right to business, huh? Well, things didn't exactly go to plan-"
  translation: "Сразу к делу, да? Ну, план пошёл не совсем так-"

- text: "You don't say? You busted out a window. Quite the exit. From what I hear, the NCU is locking down the Redlight District to investigate."
  translation: "Да ладно? Окно вышибла — ну и выход, ничего не скажешь. По слухам, NCU закрывает Район красных фонарей на проверку."

- text: "Crap. That can't be good."
  translation: "Вот чёрт. Это плохо."

- text: "No, it's not. So you're going to have to lay low wherever you are. Stay out of the Redlight District until the lockdown is lifted."
  translation: "Нет, не к добру. Так что придётся залечь на дно, где бы ты ни была. Держись подальше от Района красных фонарей, пока блокировку не снимут."

- text: "But... You're in the Redlight District. I won't be able to do the handoff until the lockdown's lifted then."
  translation: "Но... Ты же в Районе красных фонарей. Тогда я не смогу передать чемодан, пока блокировку не снимут."

- text: "Correct. So I assume that means you've got the suitcase?"
  translation: "Верно. Значит, я правильно понимаю, что чемодан у тебя?"

- text: "Well- Not exactly? I uh..."
  translation: "Ну- Не совсем? Я э..."

- text: "(Shit, do I tell her about the blocker? Better just play dumb for now.)"
  translation: "(Чёрт, сказать ей про блокиратор? Лучше пока прикинуться дурочкой.)"
  rich_text: "<i>(Shit, do I tell her about the blocker? Better just play dumb for now.)</i>"
  rich_translation: "<i>(Чёрт, сказать ей про блокиратор? Лучше пока прикинуться дурочкой.)</i>"

- text: "Well, I had to crack the suitcase open. Just had some injector thing in there. No idea what it does, but I've got it."
  translation: "Ну, мне пришлось вскрыть чемодан. Там был какой-то инжектор. Без понятия, что он делает, но он у меня."

- text: "(If I'm gonna lie to the Cartel about this... I need a fake blocker.)"
  translation: "(Если я собираюсь врать Картелю насчёт этого... Мне нужна подделка под блокиратор.)"
  rich_text: "<i>(If I'm gonna lie to the Cartel about this... I need a fake blocker.)</i>"
  rich_translation: "<i>(Если я собираюсь врать Картелю насчёт этого... Мне нужна подделка под блокиратор.)</i>"

- text: "... Interesting. I haven't seen anyone crack open one of those suitcases before. It seems you're not a complete failure after all."
  translation: "... Любопытно. Я ещё не видела, чтобы кто-то вскрывал эти чемоданы. Похоже, ты не полная неудачница."

- text: "I- Uh- Thanks?"
  translation: "Я- Э- Спасибо?"
  speaker: "Zoey"

- text: "I'll tell the Cartel about your situation. That'll calm them the fuck down. Just don't let the Enforcers or NCU get you, got it?"
  translation: "Я сообщу Картелю о твоей ситуации. Это их немного остудит, мать их. Только не попадайся Силовикам или NCU, поняла?"

- text: "The last thing we need is you getting arrested when we're so close to finally having this contract finalized."
  translation: "Последнее, что нам нужно — чтобы тебя арестовали, когда мы так близки к закрытию этого контракта."

- text: "Nice to hear you care..."
  translation: "Мило, что тебе не всё равно..."

- text: "The Redlight District lockdown should be gone in a couple days once they do their little show investigation and find nothing."
  translation: "Блокировку Района красных фонарей должны снять через пару дней, как только они проведут своё показное расследование и ничего не найдут."

- text: "Once it's lifted, wait for my call and I'll tell you when to bring it in. Got it?"
  translation: "Когда снимут — жди моего звонка, и я скажу, когда нести. Поняла?"

- text: "Yeah, you got it Boss. See you then."
  translation: "Есть, Шеф. Увидимся."

- text: "Cheer up! You're gonna get a big payout for this one."
  translation: "Не вешай нос! За это получишь большой куш."

- text: "Yep. Looking forward to it!"
  translation: "Ага. Жду не дождусь!"

- text: "(Stupid, stupid, stupid. What am I doing? Am I really thinking about throwing away my big score?)"
  translation: "(Дура, дура, дура. Что я делаю? Я правда думаю о том, чтобы выбросить свой большой куш?)"
  rich_text: "<i>(Stupid, stupid, stupid. What am I doing? Am I really thinking about throwing away my big score?)</i>"
  rich_translation: "<i>(Дура, дура, дура. Что я делаю? Я правда думаю о том, чтобы выбросить свой большой куш?)</i>"

- text: "(But what would Sarah think of me if I just cashed in the blocker?)"
  translation: "(Но что бы Сара подумала обо мне, если бы я просто сдала блокиратор?)"
  rich_text: "<i>(But what would Sarah think of me if I just cashed in the blocker?)</i>"
  rich_translation: "<i>(Но что бы Сара подумала обо мне, если бы я просто сдала блокиратор?)</i>"

