# Dialogues (path_id=2603)

- text: "I shouldn't even need a goddamn maintenance kit."
  translation: "Мне даже не нужен был бы этот грёбаный ремонтный набор."

- text: "I bet CLIT is the one programming old models to go haywire to make us buy the new shit."
  translation: "Спорю, CLIT программирует старые модели на сбои, чтобы мы покупали новое дерьмо."

- text: "I wouldn't put it past them."
  translation: "Я бы не стал их недооценивать."

- text: "What the fuck am I supposed to do now?"
  translation: "И что мне теперь, блядь, делать?"

