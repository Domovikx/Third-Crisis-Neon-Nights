# Dialogues (path_id=1268)

- text: "Aww, your nails are lookin' great, Sarah. I like those colors."
  translation: "Ой, у тебя ногти отлично выглядят, Сара. Мне нравятся эти цвета."

- text: "Thanks, bestie~! Yours are lookin' good too! Still the same color?"
  translation: "Спасибо, подруга~! У тебя тоже круто! Всё тот же цвет?"

- text: "Yeaah, I chipped one of them when I went dumpster diving. I figured I'd stay with the tried and true. If it ain't broke, ya know?"
  translation: "Ага, один сколола, когда по помойкам лазила. Решила остаться с проверенным. Работает ведь, ну?"

- text: "Well- It was broke, but not anymore."
  translation: "Ну... сломан-то он был, да. Но уже нет."

- text: "Pfft, you know what I mean!"
  translation: "Пфф, ты понимаешь, о чём я!"

