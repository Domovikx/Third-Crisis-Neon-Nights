# Dialogues (path_id=73145)

- text: "Come on, beautiful~"
  translation: "Давай, красавица~"

- text: "Take a close-up~"
  translation: "Сделай крупный план~"

- text: "We won't bite~"
  translation: "Мы не кусаемся~"

- text: "Unless you want us to~"
  translation: "Если ты сама не попросишь~"

- text: "R-Right! One picture coming right up!"
  translation: "Д-Да! Одно фото, уже готово!"

