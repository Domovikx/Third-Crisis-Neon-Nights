# Dialogues (path_id=2605)

- text: "You shouldn't give up. There might still be a way to fix your headset."
  translation: "Не сдавайся. Может быть, ещё есть способ починить твой шлем."
  speaker: "Zoey"

- text: "Really, Zoey? I'm not fucking dumb. You think I haven't tried?!"
  translation: "Серьёзно, Зои? Я не грёбаный дурак. Думаешь, я не пробовал?!"

- text: "It's too fucking old. Fixing that piece of shit would cost me almost as much as a new model."
  translation: "Он слишком старый. Починка этого куска дерьма обойдётся почти как новая модель."

- text: "And it'd take me fucking months of work to afford that."
  translation: "А чтобы заработать на это, нужно пахать месяцами."

- text: "Uh... Sorry, Jaime. I didn't mean to offend."
  translation: "Эм... Прости, Джейми. Я не хотела обидеть."

- text: "No, no... Shit. It's my fault, I... I shouldn't snap at you. Not you."
  translation: "Нет, нет... Чёрт. Я виноват, я... Не стоило срываться на тебе. Не на тебе."

- text: "I should've stopped this VR shit a long time ago. Brain burn is... You don't usually come back from that."
  translation: "Надо было бросить это VR-дерьмо давным-давно. Выгорание мозга... С него обычно не возвращаются."

- text: "...Thanks, by the way. For yesterday..."
  translation: "...Спасибо, кстати. За вчера..."

- text: "I'm just happy you're okay."
  translation: "Я просто рада, что ты в порядке."

