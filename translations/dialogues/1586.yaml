# Dialogues (path_id=1586)

- text: "Oh hey there..~ Wow you're hot, ehehe. Sorry, but I just roped in a client.~"
  translation: "О, привет..~ Ого, ты горяча, хехе. Извини, но я только что заполучила клиента.~"

- text: "Oh-! Heh-..! Erm, thanks! It's all good..!"
  translation: "О-! Хе-..! Эм, спасибо! Всё в порядке..!"

- text: "D'aww, flustered clients are the cutest! Will you be a darling, find Cal and send him to Klaudia for me? I will make it up to you next time, I promise, hehe!~"
  translation: "Ой, смущённые клиенты — самые милые! Будь лапочкой, найди Кала и отправь его к Клавдии за меня? Я отыграюсь в следующий раз, обещаю, хехе!~"

- text: "Uh-.. Cal? Wait, what? Who's that?"
  translation: "Эм-.. Кал? Погоди, что? Кто это?"

- text: "You really are new around here, heh. Bunnyboy, orange hair, blue eyes. Customer is waiting, please don't leave me hanging, darling!~"
  translation: "Ты и правда новенькая здесь, хех. Зайчик, оранжевые волосы, голубые глаза. Клиент ждёт, не подведи меня, дорогая!~"

