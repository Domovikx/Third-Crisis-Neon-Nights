# Dialogues (path_id=2553)

- text: "Sarah? You okay?"
  translation: "Сара? Ты в порядке?"

- text: "No, no I'm not. I-"
  translation: "Нет, нет, не в порядке. Я-"

- text: "I fucked up, Z. I didn't realize how long we were taking here... I missed the entire day of work. Dad's at the end of his rope."
  translation: "Я облажалась, Зи. Я не поняла, сколько мы тут провели времени... Я пропустила целый рабочий день. Папа на пределе."

- text: "Shit... I should've reminded you... I was just so wrapped up in-"
  translation: "Чёрт... Я должна была напомнить тебе... Я просто так увлеклась-"

- text: "No, it wasn't your fault, Z. It was just me. I fucked up, as usual..."
  translation: "Нет, это не твоя вина, Зи. Только моя. Я облажалась, как обычно..."

- text: "Sarah... Don't beat yourself up."
  translation: "Сара... Не кори себя."

- text: "What else am I supposed to do? I lost the only thing I'm good for-"
  translation: "А что мне ещё делать? Я потеряла единственное, на что я гожусь-"

- text: "Fuck, sorry, Zoey. He's canceling my fB card..."
  translation: "Блин, прости, Зои. Он блокирует мою fB-карту..."

- text: "But that means my bills..."
  translation: "Но это значит, что мои счета..."

- text: "Wait, what? Are you going to be okay?!"
  translation: "Подожди, что? Ты справишься?!"

- text: "I'll be alright... I somehow still have my job... but... Zoey, I was going to help with your bills..."
  translation: "Я справлюсь... У меня ещё есть работа... но... Зои, я собиралась помочь тебе со счетами..."

- text: "And without your fB card... you..."
  translation: "А без твоей fB-карты... ты..."

- text: "Sarah Dialogue Preset"
  translation: "Пресет диалога Сары"
  speaker: "Sad"

- text: "But that means I'm gonna be..."
  translation: "Но это значит, что я буду..."

- text: "... Yeah..."
  translation: "... Да..."

- text: "I'm really sorry, Zoey... I-"
  translation: "Мне очень жаль, Зои... Я-"

- text: "Shit, he's calling me again, agh... I gotta go, Zoey. I'm so sorry. Onward and upward, okay?"
  translation: "Чёрт, он снова звонит, ай... Мне пора, Зои. Мне так жаль. Вперёд и вверх, хорошо?"

