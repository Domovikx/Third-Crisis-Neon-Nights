# Dialogues (path_id=2566)

- text: "Uhhh... Hello? Is this place open?"
  translation: "Эмм... Здравствуйте? Это заведение открыто?"

- text: "Wouldn't you like to know, hmm~?"
  translation: "Хотелось бы тебе знать, хмм~?"

- text: "I-... Yes?"
  translation: "Я-... Да?"
  speaker: "Zoey"

- text: "Fufufu~ Sorry, my dear~ We're closed right now~"
  translation: "Фуфуфу~ Прости, моя дорогая~ Мы сейчас закрыты~"

- text: "But this place says it's a 24/7 kiosk..."
  translation: "Но тут же написано, что это круглосуточный киоск..."

- text: "Does it really? Oh- That. Well, you've caught me at a bit of an... awkward time. I'm still moving in, sorting things out~"
  translation: "Неужели? О- Это. Ну, ты застала меня в довольно... неловкий момент. Я ещё переезжаю, разбираю вещи~"

- text: "Say~ You wouldn't be looking for work would ya? You look like the mercenary type. Got a lot of experience with those lately~"
  translation: "Скажи-ка~ Ты случайно не ищешь работу? Выглядишь как наёмница. В последнее время у меня с такими много опыта~"

- text: "Well- Yeah, I am. What sort of job is it?"
  translation: "Ну- Да, ищу. А что за работа?"

- text: "Oh you'll love it, my dear. You see, I run a... little bit of an enterprise, the Witch's Cauldron, perhap you've heard of it~"
  translation: "О, тебе понравится, дорогуша. Видишь ли, у меня тут... небольшое предприятие — «Котёл Ведьмы». Может, слышала о нём~"

- text: "No, I haven't."
  translation: "Нет, не слышала."

- text: "Tsk! I gotta have a word with my marketing team then~ Have you even heard of my name? Calliach?"
  translation: "Тск! Надо будет поговорить с моим маркетинговым отделом~ Ты хоть слышала моё имя? Каллиах?"

- text: "Calliach Presets"
  translation: "Пресеты Каллиах"
  speaker: "Angry"

- text: "Anyway, I had a sweetie set up vending machines for my wares around this little city. I've been trying to figure out distribution lately."
  translation: "В общем, я попросила одного милашку расставить по городу автоматы с моими товарами. В последнее время пытаюсь разобраться с дистрибуцией."

- text: "But the dolt hasn't gotten back to me with any of the... 'profits' from these machines."
  translation: "Но этот болван не вернулся ко мне с какой-либо... «выручкой» от автоматов."

- text: "And at this point I feel like he's been picked up by those religious zealots that strut around town."
  translation: "И сейчас мне кажется, что его подобрали эти религиозные фанатики, что разгуливают по городу."

- text: "Religous... huh? What are you talking about?"
  translation: "Религиозные... хм? О чём ты?"

- text: "Oop- Wrong spot."
  translation: "Упс- Не туда."

- text: "Just forget I said that, my sweet sapphic sapphire."
  translation: "Просто забудь, что я сказала, мой сладкий сапфир."

- text: "Anyways, I've decided to handle things the good ol' fashioned way. But I need someone to grab my concoctions from those machines."
  translation: "В общем, я решила разобраться по старинке. Но мне нужен кто-то, кто заберёт мои зелья из автоматов."

- text: "That's where you come in, Zoey."
  translation: "И тут появляешься ты, Зои."

- text: "W- How do you know my name?"
  translation: "О- Откуда ты знаешь моё имя?"

- text: "Oop, that slipped out. Sorry, dear. Let's just say I have my ways~"
  translation: "Упс, вырвалось. Прости, дорогуша. Скажем так, у меня свои методы~"

- text: "Right... So if I do this for you, what do I get in return?"
  translation: "Ладно... И что я получу взамен?"

- text: "Kidding, kidding... You're not perverted enough for that yet anyway."
  translation: "Шучу, шучу... Ты всё равно ещё недостаточно извращена для этого."

- text: "But I have many brews that could interest you~ You could become part of my... exclusive clientele... Once I'm set up, of course."
  translation: "Но у меня есть много настоек, что могли бы тебя заинтересовать~ Ты могла бы стать частью моей... эксклюзивной клиентуры... Когда я обустроюсь, разумеется."

- text: "Brews? Like a bar?"
  translation: "Настойки? Типа бара?"

- text: "Yes! Of sorts~ You'll see once it's ready, my darling. Now go, there's a machine right here. Get it open and get me the concoction within."
  translation: "Да! Вроде того~ Увидишь, когда будет готово, моя дорогая. А теперь иди, автомат прямо здесь. Вскрой его и принеси мне зелье."

- text: "Okay...? And how do I get it open?"
  translation: "Ладно...? А как мне его вскрыть?"

- text: "Use your fancy little tech magic to unlock it!"
  translation: "Используй свою хитрую техническую магию, чтобы вскрыть его!"

- text: "Right... Something tells me this won't be easy."
  translation: "Ну конечно... Что-то подсказывает мне, что это будет непросто."

- text: "Such an astute little lady you are~!"
  translation: "Какая же ты догадливая малышка~!"

