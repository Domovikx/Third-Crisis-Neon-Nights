# Dialogues (path_id=2135)

- text: "Jeez, Zoey. You okay? You look like you got roughed up."
  translation: "Боже, Зои. Ты в порядке? Выглядишь потрёпанной."

- text: "Oh- I uh... fell."
  translation: "О- я эм... упала."

- text: "Sheesh. Glad you're alright."
  translation: "Ну нифига себе. Рада, что с тобой всё в порядке."

- text: "Landlord got you smoking in the hallway again?"
  translation: "Хозяйка опять застукала тебя за курением в коридоре?"

- text: "Yeah, don't feel like walkin' all the way outside today. Feeling kinda shitty lately. Must be under the weather."
  translation: "Ага, не хочется сегодня тащиться на улицу. Чувствую себя хреново в последнее время. Видимо, приболела."

- text: "Oh, sorry to hear. I hope you get better soon!"
  translation: "О, мне жаль. Надеюсь, ты скоро поправишься!"

- text: "Me too. Landlord ain't helping, that's for sure. God, she's such a bitch. I pay an arm and a leg, I should smoke where I want."
  translation: "Я тоже. Хозяйка уж точно не помогает. Господи, она такая стерва. Я плачу бешеные деньги, должна курить где хочу."

- text: "I know right? It's an absolute scam."
  translation: "Верно, да? Это полный развод."

- text: "Never seen you take a drag before."
  translation: "Никогда не видела, как ты затягиваешься."

- text: "Oh- Yeah, I don't smoke anymore. Kicked it a while ago."
  translation: "А- Да, я больше не курю. Бросила некоторое время назад."

- text: "God, I wish I had that willpower. Good on you, hun."
  translation: "Боже, вот бы мне такую силу воли. Молодец, милая."

