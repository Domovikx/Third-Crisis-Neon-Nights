# Dialogues (path_id=2168)

- text: "Hey yourself!"
  translation: "И тебе привет!"
  speaker: "Zoey"

- text: "I'm sorry for venting so much. I enjoyed our walk."
  translation: "Прости, что так много жаловалась. Мне понравилась наша прогулка."

- text: "It was nothing. I had a good time."
  translation: "Да ничего. Я хорошо провела время."

- text: "...I'm glad."
  translation: "...Я рада."

