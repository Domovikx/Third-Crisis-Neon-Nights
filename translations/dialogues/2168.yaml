# Dialogues (path_id=2168)

- text: "Hey yourself!"
  translation: "И тебе привет!"
  speaker: "Zoey"

- text: "I'm sorry for venting so much. I enjoyed our walk."
  translation: "Прости, что столько выговаривалась. Прогулка мне понравилась."

- text: "It was nothing. I had a good time."
  translation: "Ничего страшного. Я отлично провела время."

- text: "...I'm glad."
  translation: "...Я рада."

