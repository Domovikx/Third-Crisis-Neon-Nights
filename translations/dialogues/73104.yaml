# Dialogues (path_id=73104)

- text: "Heyy, officers..."
  translation: ""

- text: "Almost seemed like you were trying to get away from us."
  translation: "Чуть не показалось, что ты пыталась от нас удрать."
  speaker: "Enforcer"

- text: "Uhm... W-well..."
  translation: ""

- text: "Surely, you're not travelling without a ticket, hm?"
  translation: "Ты ведь не путешествуешь без билета, мм?"
  speaker: "Enforcer"

- text: "A-about that..."
  translation: ""

- text: "Well then. The way I see it, you have two choices."
  translation: "Что ж. Я вижу два варианта."
  speaker: "Enforcer"

- text: "Either you pay the 100 fb fine for travelling without a ticket... Or..."
  translation: "Либо платишь штраф в 100 кредитов за безбилетный проезд... Или..."
  speaker: "Enforcer"

- text: "A pretty girl like you could pay for her tickets in... other ways."
  translation: "Такая хорошенькая девушка, как ты, может оплатить проезд... другим способом."
  speaker: "Enforcer"

- text: "What do you... mean...?"
  translation: ""

- text: "Your tits seem perfect to show your... gratitude... to your GAG protectors, keeping citizens like you safe. Why don't you give us a little taste, hmm?"
  translation: "Твои сиськи отлично подойдут, чтобы выразить... благодарность... своим защитникам из ГАГ, которые обеспечивают безопасность таких граждан, как ты. Почему бы не показать нам немного, мм?"
  speaker: "Enforcer"

