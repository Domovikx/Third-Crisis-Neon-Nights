# Dialogues (path_id=1254)

- text: "Did you two see that Slutbox? Thing looked like it was gonna explode. Had the enforcers chasing after it."
  translation: "Вы двое видели тот Слатбокс? Он выглядел так, будто сейчас взорвётся. За ним гнались энфорсеры."

- text: "We did more than see it. We were the ones driving it."
  translation: "Мы не просто видели. Это мы за рулём были."

- text: "Wait- That was you two? Wow. You saved my synthetic bacon with that. Those two enforcers seemed like they were looking for trouble."
  translation: "Погодите- Это были вы двое? Ого. Вы спасли мою синтетическую шкуру. Те двое энфорсеров явно искали неприятностей."

- text: "Well, it was mainly Zoey here. I just rode along."
  translation: "Ну, в основном это Зои. Я просто прокатился."

- text: "It was your idea."
  translation: "Это была твоя идея."

- text: "You ever think of trying to get into that street race league that's going on? You'd probably make a ton of money with skills like that."
  translation: "Не думала вступить в ту уличную гоночную лигу? С такими навыками можно кучу денег заработать."

- text: "Oh- I... No, never thought of that."
  translation: "О- Я... Нет, никогда не думала об этом."

- text: "You totally should next time they meet up!"
  translation: "Тебе точно стоит в следующий раз, когда они соберутся!"

- text: "Oh my gosh. If you get into that league you'll be spoutin' off about 'family' in no time."
  translation: "Боже мой. Если вступишь в эту лигу, будешь трепаться о «семье» через пять минут."

- text: "Haha! Anyway, what do you racers need? It's on the house."
  translation: "Хаха! В общем, что нужно гонщикам? За счёт заведения."

