# Dialogues (path_id=3220992949410603944)

- text: "Feeling curious about what's between my legs, hun~?"
  translation: "Любопытно, что у меня между ног, милашка~?"

- text: "Oh- Uh- No! I- mean- Heh- I don't mean you're not- I mean- Eheh..."
  translation: "О- Э- Нет! Я- в смысле- Хе- Я не имею в виду, что ты не- Я имею в виду- Хе-хе..."

- text: "Wow, that is one hell of a meltdown~ You thinking about what you'd prefer to be under there?"
  translation: "Ничего себе, это просто эпичный разнос~ Думаешь о том, что бы ты предпочла там увидеть?"

- text: "teasing, flirty, dominant."
  translation: "дразнящий, игривый, доминантный."

- text: "So what would you prefer~? Just curious."
  translation: "Так что бы ты предпочла~? Просто любопытно."

- text: "Ehh?! U-Uhm... heh... n-no comment..."
  translation: "Э-э?! Э-Эм... хе... б-без комментариев..."

- text: "Oh, you're so adorable... That's okay, sweetheart~ We don't have to talk about it if it makes you uncomfortable~"
  translation: "О, ты такая милая... Всё в порядке, сладкая~ Нам не обязательно говорить об этом, если тебе неловко~"

