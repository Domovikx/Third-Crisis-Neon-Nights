# Dialogues (path_id=73144)

- text: "Aww, look what we have! An onlooker~"
  translation: "Оу, посмотрите, кто к нам пришёл! Зевака~"

- text: "Oooh~ a cute one too~"
  translation: "Ооо~ да ещё и симпатичная~"

- text: "U-Uh! Hi! I just uh- need to get by- heh."
  translation: "Э-Э! Привет! Я просто э-э- хочу пройти- хех."

- text: "Oh we'll let you by~"
  translation: "О, мы тебя пропустим~"

- text: "For a price~"
  translation: "За определённую плату~"

- text: "Uhh-! What... kinda price?"
  translation: "Э-э-э! Какую... плату?"

- text: "Hmm~ We're thinkin'-"
  translation: "Хмм~ Мы думаем-"

- text: "-a spicy pricey~"
  translation: "-пикантную платку~"

- text: "U-Uh! Heh-"
  translation: "Э-Э! Хех-"

- text: "Take a picture~"
  translation: "Сфоткай нас~"

- text: "Of us two~"
  translation: "Нас двоих~"

- text: "Oh-! I can do that! N-No problem!"
  translation: "О-! Я могу это сделать! Б-Без проблем!"

