# Dialogues (path_id=1257)

- text: "Nice! That flash helped recalibrate its optic sensor. It can see again!"
  translation: "Отлично! Вспышка помогла перекалибровать его оптический сенсор. Теперь он снова видит!"

- text: "From super spy to super hero. That's my Zoey."
  translation: "Из супершпионки в супергероиню. Вот это моя Зои."

