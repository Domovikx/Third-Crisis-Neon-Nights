# Dialogues (path_id=2486)

- text: "You did it. Nice!"
  translation: "Справилась. Класс!"

- text: "Piece of cake!"
  translation: "Раз плюнуть!"

- text: "Let's see what's in here... Eh?! There's nothing in here but a lousy picture? What a ripoff!"
  translation: "Глянем, что внутри... А?! Тут только паршивая фотка? Вот развод!"

- text: "Picture? What kind of picture is it?"
  translation: "Фотка? Что за фотка?"

- text: "Just take a look... I'm outta here."
  translation: "Сама взгляни... Я сваливаю."

