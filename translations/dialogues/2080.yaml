# Dialogues (path_id=2080)

- text: "Cartel, huh? I have to deal with so many reports about them at work. They"
  translation: "Картель, значит? Мне на работе приходится разбирать столько отчётов о них. Они..."

- text: "Yeah, I figured. Didn't think a group calling themselves \"The Cartel\" would be good news."
  translation: "Ага, я так и поняла. Не думала, что группа, называющая себя «Картель», будет хорошей новостью."
  speaker: "Zoey"

- text: "You should"
  translation: "Тебе стоит"

- text: "I wanted to pay my own rent for once. I'm thankful for your help, Sarah, but I really need to step up."
  translation: "Я хотела сама платить за аренду хоть раз. Я ценю твою помощь, Сара, но мне нужно начать самой зарабатывать."
  speaker: "Zoey"

- text: "Yeah, but not like this. Those guys are bad news."
  translation: "Ага, но только не так. Те ребята — дурная весть."

- text: "What was that blocker thing for anyway?"
  translation: "А для чего вообще нужен был этот блокиратор?"

- text: "s got to do with something called Peitho. Does that name ring any bells?"
  translation: "Это связано с кое-чем под названием Пейто. Это имя тебе о чём-нибудь говорит?"

- text: "Hm. Can"
  translation: "Хм. Мо..."

- text: "Well, apparently it"
  translation: "Ну, видимо, он"

- text: "Wait. It like, stops the itch? For good?"
  translation: "Подожди. Оно типа, останавливает зуд? Насовсем?"

- text: "Yeah. Well, it doesn't keep it from building up again. But once I used it, the itch was gone."
  translation: "Ага. Ну, оно не мешает ему снова нарастать. Но как только я его использовала, зуд пропал."

- text: "Fuck, Zoey. Are you serious? But that could mean... you'd be able to make a cure or something?"
  translation: "Чёрт, Зои. Ты серьёзно? Но это могло бы значить... ты смогла бы создать лекарство или что-то вроде того?"

- text: "I'm not smart enough to make it."
  translation: "Я недостаточно умна, чтобы сделать это."

- text: "Not Smart Enough"
  translation: "Недостаточно Умная"

- text: "Well- Not me... but yeah, maybe someone smarter would be able to."
  translation: "Ну- не я... но да, может, кто-то поумнее смог бы."

- text: "Could you even trust anyone else with this?"
  translation: "А ты вообще сможешь доверить это кому-то ещё?"

- text: "I trust you."
  translation: "Я тебе доверяю."

- text: "Aww! Thanks, bestie. I can't exactly make a cure though."
  translation: "Ой! Спасибо, лучшая подруга. Только я не могу вот так просто создать лекарство."

- text: "Ugh... And what am I supposed to do about the Cartel?"
  translation: "Угх... И что мне теперь делать с Картелем?"

- text: "I guess that'd be worth a lot right?"
  translation: "Думаю, это стоило бы кучу денег, да?"

- text: "W- You're really thinking about selling that thing?"
  translation: "Т- Ты в самом деле думаешь продать эту штуку?"

- text: "I-I mean... Maybe? What else would I do with it?"
  translation: "Н-ну... Может? А что ещё мне с ним делать?"

- text: "I don't know. Get it to someone who can reproduce it. Save the world maybe? How about that?"
  translation: "Не знаю. Передать тому, кто сможет его воспроизвести. Спасти мир, может? Как тебе такое?"

- text: "Wh- Do I look like Vibe? I'm no hero, Sarah. We're talking about GAG here, not to mention the Cartel."
  translation: "Т- Я похожа на Вайб? Я не герой, Сара. Мы говорим о GAG, не говоря уже о Картеле."

- text: "And I'm talking about you, Zoey Madison. I know you have it in you. Just think about it before you pawn that thing off to the Cartel."
  translation: "А я говорю о тебе, Зои Мэдисон. Я знаю, что ты на это способна. Просто подумай, прежде чем сбывать эту штуку Картелю."

- text: "I- Yeah okay, and if the Cartel comes after my ass?"
  translation: "Д- Ладно, и что если Картель придёт по мою душу?"

- text: "Well I don't know. Just lie to them."
  translation: "Ну, я не знаю. Просто соври им."

- text: "Lie to the Cartel? You make it sound so easy."
  translation: "Соврать Картелю? Ты делаешь это таким простым."

- text: "I didn't say it'd be easy, super spy."
  translation: "Я не говорила, что будет легко, супершпионка."

- text: "Well, you have fun with that. I need to take a shower too. Scoot over."
  translation: "Ну, развлекайся. Мне тоже нужно принять душ. Подвинься."

