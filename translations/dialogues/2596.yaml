# Dialogues (path_id=2596)

- text: "Uhm... I had to take a picture of you while you were out... It was the only way I could get you the battery you needed."
  translation: "Эмм... Пока тебя не было, я сделал снимок... Это был единственный способ достать тебе нужную батарею."

- text: "(Ugh... It wasn't the only way...)"
  translation: "(Угх... Был не единственный способ...)"
  rich_text: "<i>(Ugh... It wasn't the only way...)</i>"
  rich_translation: "<i>(Угх... Был не единственный способ...)</i>"

- text: "Picture? Of this one's frame? Interesting..."
  translation: "Снимок? Этого тела? Любопытно..."

- text: "Yeah. Sorry."
  translation: "Ага. Прости."

- text: "This one... understands."
  translation: "Мне... понятно."

