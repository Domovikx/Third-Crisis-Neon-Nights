# Dialogues (path_id=73102)

- text: "Greetings fair maiden! How goest your travels?"
  translation: "Приветствую, прекрасная дева! Как проходит твой путь?"

- text: "Uhhh... good?"
  translation: "Э-э-э... хорошо?"

- text: "Oh joy! I've been meaning to bequeath my thanks upon thee for assisting with the fair maiden Jasmine in the Glowing Hole."
  translation: "О радость! Я хотел выразить тебе благодарность за помощь прекрасной деве Жасмин в «Сияющей Дыре»."

- text: "Oh! Yeah- How'd that go?"
  translation: "О! Ага- Как всё прошло?"

- text: "T'was a night of pleasantry and shared romance. Our love had no equal, nay the stars above could not match the depth of our passion!"
  translation: "То была ночь услад и взаимной романтики. Нашей любви не было равных, и даже звёзды не могли сравниться с глубиной нашей страсти!"

- text: "Wow! Sounds like you two had a good time! So what'd ya do?"
  translation: "Ого! Похоже, вы отлично провели время! И чем же вы занимались?"

- text: "We had coffee!"
  translation: "Мы пили кофе!"

- text: "Well... Whatever works for you, I guess."
  translation: "Ну... Каждому своё, полагаю."

