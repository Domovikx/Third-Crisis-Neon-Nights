# Dialogues (path_id=1701)

- text: "\"This is Dr. Lozenge. Lead Scientist of Project Crush in the R&D Department of Peitho...\""
  translation: "\"Это доктор Лозендж. Ведущий учёный проекта «Краш» в отделе R&D компании Пейто...\""
  rich_text: "<i>\"This is Dr. Lozenge. Lead Scientist of Project Crush in the R&D Department of Peitho...\""
  rich_translation: "<i>\"Это доктор Лозендж. Ведущий учёный проекта «Краш» в отделе R&D компании Пейто...\""

- text: "\"Now I'm sure you have many questions... like \"What even is Peitho?\"-"
  translation: "\"Уверен, у вас много вопросов... например: «Что вообще такое Пейто?»-"
  rich_text: "<i>\"Now I'm sure you have many questions... like \"What even is Peitho?\"-</i>"
  rich_translation: "<i>\"Уверен, у вас много вопросов... например: «Что вообще такое Пейто?»-</i>"

- text: "\"We recently conducted a successful test of Crush Waves... a true method of mind control... with a side effect of arousal.\""
  translation: "\"Недавно мы провели успешное тестирование Crush-волн... настоящий метод контроля сознания... с побочным эффектом возбуждения.\""
  rich_text: "<i>\"We recently conducted a successful test of Crush Waves... a true method of mind control... with a side effect of arousal.\"</i>"
  rich_translation: "<i>\"Недавно мы провели успешное тестирование Crush-волн... настоящий метод контроля сознания... с побочным эффектом возбуждения.\"</i>"

- text: "\"It worked... too well. The ramifications are horrifying. My coworkers are now discussing mass emission methods.\""
  translation: "\"Оно сработало... слишком хорошо. Последствия ужасают. Мои коллеги уже обсуждают методы массового излучения.\""
  rich_text: "<i>\"It worked... too well. The ramifications are horrifying. My coworkers are now discussing mass emission methods.\"</i>"
  rich_translation: "<i>\"Оно сработало... слишком хорошо. Последствия ужасают. Мои коллеги уже обсуждают методы массового излучения.\"</i>"

- text: "\"So... I've created an antidote. The 'Crush Blocker' in this suitcase should innoculate someone against my poison.\""
  translation: "\"Поэтому... я создал антидот. «Crush-Блокатор» в этом чемоданчике должен защитить кого-то от моего яда.\""
  rich_text: "<i>\"So... I've created an antidote. The 'Crush Blocker' in this suitcase should innoculate someone against my poison.\"</i>"
  rich_translation: "<i>\"Поэтому... я создал антидот. «Crush-Блокатор» в этом чемоданчике должен защитить кого-то от моего яда.\"</i>"

- text: "\"I just... couldn't perfect the antidote, so it's temporary. It only heals Crush buildup... or in layman's terms... reverses arousal.\""
  translation: "\"Я просто... не смог довести антидот до ума, так что он временный. Он лишь лечит накопление Crush... проще говоря... подавляет возбуждение.\""
  rich_text: "<i>\"I just... couldn't perfect the antidote, so it's temporary. It only heals Crush buildup... or in layman's terms... reverses arousal.\""
