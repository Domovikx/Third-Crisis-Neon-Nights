- text: "\"I truly believed my work would make the world a better place. That if people were just compelled to cooperate together...\""
  translation: "\"Я искренне верил, что моя работа сделает мир лучше. Что если людей просто <b>вынудить</b> сотрудничать друг с другом...\""
  rich_text: "<i>\"I truly believed my work would make the world a better place. That if people were just <b>compelled</b> to cooperate together...\"</i>"
  rich_translation: "<i>\"Я искренне верил, что моя работа сделает мир лучше. Что если людей просто <b>вынудить</b> сотрудничать друг с другом...\"</i>"

- text: "\"Well... time has shown me just how wrong I was. I just hope the world doesn't need to suffer because of my mistakes.\""
  translation: "\"Что ж... время показало, как сильно я ошибался. Надеюсь, миру не придётся страдать из-за моих ошибок.\""
