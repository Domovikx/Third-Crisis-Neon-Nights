# Dialogues (path_id=1272)

- text: "Oop, my dad's callin' me, one second, Z."
  translation: "Ой, папа меня зовёт, секунду, Зи."

- text: "Hey, daddy! ... Oh I'm at a salon with Zoey right now!"
  translation: "Привет, пап! ... А я сейчас в салоне с Зои!"

- text: "I... Mhm... But I-... No, I was just-"
  translation: "Я... Мхм... Но я-... Нет, я просто-"

- text: "But- But you can't just- What about Zoey?!"
  translation: "Но- Но ты не можешь просто- А как же Зои?!"

- text: "Yes sir, on my way... Bye."
  translation: "Да, хорошо, уже иду... Пока."

- text: "Sarah? Everything okay?"
  translation: "Сара? Всё в порядке?"

- text: "I... I need some air, Z. I uh... I'll meet you out there."
  translation: "Я... Мне нужен воздух, Зи. Я, эм... Встречу тебя там."

