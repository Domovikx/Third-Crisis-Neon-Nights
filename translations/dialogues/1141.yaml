  translation: "Ха-ха, ну.. Если хочешь обслуживание за столиком, можешь заказать пульт, чтобы вызвать меня."

- text: "Mhm! You can be sure to catch my attention when you press the button. The vibrators were my-"
  translation: "Угу! Можешь не сомневаться — нажмёшь кнопку, и я сразу прибегу. Вибраторы были мо-"

- text: "S-sorry..! Table 8 is asking for me! Hh..!"
  translation: "П-прости..! Восьмой столик меня зовёт! Х-х..!"

