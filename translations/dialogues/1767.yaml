# Dialogues (path_id=1767)

- text: "How'd my Mark react to that?"
  translation: "Как мой Марк на это отреагировал?"

- text: "You really knocked him out with that one."
  translation: "Ты его знатно вырубила этим."

- text: "Yeah, I'm a stunner."
  translation: "Ага, я просто сногсшибательна."

- text: "No, like you legitimately knocked him out."
  translation: "Нет, я серьёзно, ты его реально вырубила."

- text: "I'm dazzling!"
  translation: "Я ослепительна!"

