# Dialogues (path_id=2078)

- text: "Hey bestie!"
  translation: "Привет, подруга!"

- text: "Sarah!-.. *whew* You spooked me!"
  translation: "Сара!-.. *уф* Ты меня напугала!"
  speaker: "Zoey"

- text: "How did you get in?"
  translation: "Как ты вошла?"
  speaker: "Zoey"

- text: "Huh? My fingerprints are also keyed to your lock, silly!"
  translation: "А? Мой отпечаток тоже привязан к твоему замку, глупышка!"

- text: "Were you expecting someone else?~"
  translation: "Ты ждала кого-то другого?~"

- text: "I don"
  translation: "Я не"

- text: "Shame, really..~ Maybe you should! Look at that body. Stunning!"
  translation: "Жаль, правда..~ Может, тебе стоит! Посмотри на это тело. Потрясающе!"

