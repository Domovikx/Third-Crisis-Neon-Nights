# Dialogues (path_id=1560)

- text: "Welcome, darling. We have only the finest of wares, all at the tip of your fingers. If you can pay."
  translation: "Добро пожаловать, дорогая. У нас только лучший товар, всё у тебя под рукой. Если можешь заплатить."
  speaker: "Klaudia"

- text: "Hey, uh, thanks. I'm not really here for.. that."
  translation: "Эй, эм, спасибо. Я не совсем за.. этим."

- text: "There is no need to be so shy, sweetheart. My Bunnies can make all your troubles go away."
  translation: "Не нужно стесняться, милая. Мои зайчики решат все твои проблемы."
  speaker: "Klaudia"

- text: "I-.. I'm just here to have a look around, heh...!"
  translation: "Я-.. Я просто хочу осмотреться, хех...!"

- text: "Looking, hmm?~ Looking for work then? You'd attract lots of customers in one of our bunnysuits with that body."
  translation: "Осмотреться, хм?~ Тогда может работу ищешь? Ты бы привлекла кучу клиентов в одном из наших костюмов зайки с таким телом."
  speaker: "Klaudia"
