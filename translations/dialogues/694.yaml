# Dialogues (path_id=694)

- text: "You really have a lot of tech for the cat."
  translation: "У тебя и правда много техники для кошки."
  speaker: "Zoey"

- text: "When I moved here, I made sure to bring the important things."
  translation: "Когда я переезжала сюда, я позаботилась взять важные вещи."
  speaker: "Leona"

- text: "I don't think Felicia would have felt at home otherwise."
  translation: "Иначе Фелиция вряд ли чувствовала бы себя как дома."
  speaker: "Leona"

- text: "Felicia sure does seem to have a caring owner."
  translation: "У Фелиции определённо заботливая хозяйка."
  speaker: "Zoey"

- text: "You couldn't be more right, darling."
  translation: "Ты абсолютно права, дорогая."
  speaker: "Leona"

