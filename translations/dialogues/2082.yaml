# Dialogues (path_id=2082)

- text: "You barely touched the bananas I got you!"
  translation: "Ты почти не тронула бананы, которые я тебе купила!"

- text: "Sorry! Just haven't had much time to dig in. Plus I'm more of an apple girl anyways."
  translation: "Прости! Просто не было времени перекусить. К тому же я больше по яблокам."

- text: "I'll keep that in mind for next time."
  translation: "Буду иметь в виду на будущее."

