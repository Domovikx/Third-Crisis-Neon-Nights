# Dialogues (path_id=1542)

- text: "Some dipshit thought it would be a great idea to ruin this room and now I have to clean it."
  translation: "Какой-то придурок решил, что разнести эту комнату — отличная идея, а теперь мне убирать."
  speaker: "Bunnyboy"

- text: "Yeah.. They were moved to 102 and I was sent to clean up.. Ugh.."
  translation: "Ага.. Их перевели в 102, а меня послали убирать.. Угх.."
  speaker: "Bunnyboy"

- text: "You wouldn't be willing to.. Lend me a hand and clean up?"
  translation: "Не поможешь мне.. прибраться?"
  speaker: "Bunnyboy"

