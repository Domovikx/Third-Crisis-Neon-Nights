# Dialogues (path_id=384)

- text: "Something's really fishy about this stand."
  translation: "С этим стендом что-то очень подозрительно."

- text: "Looks like a regular stand to me."
  translation: "Мне кажется обычным стендом."

- text: "Trust me, I've seen enough corpo scams to see through them."
  translation: "Поверь, я видела достаточно корпоративных афер, чтобы распознать их."

- text: "Ask about the place."
  translation: "Спросить про это место."
  speaker: "AboultCauldron"

