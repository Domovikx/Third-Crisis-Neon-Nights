# Dialogues (path_id=2063)

- text: "Sarah has this fish ever moved before you gave it to me?"
  translation: "Сара, эта рыба вообще двигалась, до того как ты мне её дала?"

- text: "Hmmm no?"
  translation: "Хм, нет?"

- text: "So it's supposed to not move?"
  translation: "То есть она не должна двигаться?"

- text: "I think so?"
  translation: "Наверное?"

