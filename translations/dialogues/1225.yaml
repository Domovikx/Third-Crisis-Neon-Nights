# Dialogues (path_id=1225)

- text: "So, what did you want to know about them?"
  translation: "Итак, что ты хотела узнать о них?"

- text: "Ah-... so the uhm... the control unit, where is it located?"
  translation: "А-... так, э-э... пульт управления, где он находится?"

- text: "Control unit? It's at my counter in a cabinet. I guess I can show you if you really wanna know."
  translation: "Пульт управления? Он в шкафу за стойкой. Могу показать, если так уж хочешь знать."

