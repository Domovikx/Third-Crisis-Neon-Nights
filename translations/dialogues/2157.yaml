# Dialogues (path_id=2157)

- text: "Jaime? You okay, hun?"
  translation: "Джейми? Ты в порядке, милая?"

- text: "I... Wha... Zoey? What happened...?"
  translation: "Я... Ч-что... Зои? Что случилось...?"

- text: "You were about to get Brain Burn in that headset. But I was able to fix it and pull you out."
  translation: "У тебя почти началась Прожарка мозга в этой гарнитуре. Но я смогла починить её и вытащить тебя."

- text: "You... You saved me? You mean I was gonna... go braindead?"
  translation: "Ты... Ты спасла меня? То есть я могла... стать овощем?"

- text: "Hey... It's okay. You're alright."
  translation: "Эй... Всё в порядке. Ты в безопасности."

- text: "Fuck... I didn't... Zoey... I... I never thought I'd..."
  translation: "Блять... Я не... Зои... Я... Я никогда не думала, что..."

- text: "Jaime... You're okay now."
  translation: "Джейми... Теперь ты в порядке."

- text: "No... No, I'm not... This VR shit isn't worth my life... But it's just... It's the only good thing in my life anymore..."
  translation: "Нет... Нет, не в порядке... Это дерьмо VR не стоит моей жизни... Но просто... Это единственное хорошее, что у меня осталось..."

- text: "I'm sorry, Zoey... I'm really sorry for the scare."
  translation: "Прости, Зои... Мне правда жаль, что я тебя напугала."

- text: "No... it's alright. I'm just glad you're alive, Jaime..."
  translation: "Нет... всё в порядке. Я просто рада, что ты жива, Джейми..."

- text: "Zoey... I... I need some time to be alone... and just... think... you know? I'm... not gonna use the headset again, don't worry..."
  translation: "Зои... Я... Мне нужно побыть одной... и просто... подумать... понимаешь? Я... больше не буду пользоваться гарнитурой, не волнуйся..."

- text: "Are you sure, Jaime? You don't have to be alone."
  translation: "Ты уверена, Джейми? Тебе не обязательно быть одной."

- text: "I'm sure... I'll uh... see you around, Zoey. Thank you again. Thank you so much for the save. I don't know how I'll ever repay you..."
  translation: "Я уверена... Я эм... увидимся, Зои. Ещё раз спасибо. Огромное спасибо за спасение. Не знаю, как смогу отблагодарить тебя..."

- text: "Don't mention it, Jaime. I'll be right next door if you ever need me."
  translation: "Не стоит благодарности, Джейми. Я буду за стенкой, если понадоблюсь."
  speaker: "Zoey"

