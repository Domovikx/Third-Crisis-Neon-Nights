# Dialogues (path_id=1256)

- text: "Hey, what's wrong with this one?"
  translation: "Эй, что с этим?"

- text: "Not sure... It looks like it's having trouble seeing. Those enforcers must've damaged its optic sensor."
  translation: "Не уверена... Похоже, у него проблемы со зрением. Должно быть, силовики повредили оптический сенсор."

- text: "They did what to the huh? Well, how do we fix it?"
  translation: "Что они с ним сделали? А? Ну и как нам это починить?"

- text: "Hmm... Maybe a flash could help recalibrate the sensor."
  translation: "Хм... Может, вспышка поможет перекалибровать сенсор."

- text: "Do we have anything with a flash?"
  translation: "У нас есть что-нибудь со вспышкой?"

