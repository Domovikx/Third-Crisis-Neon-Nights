# Dialogues (path_id=839)

- text: "You can take that money and stick it up your ass!"
  translation: "Можешь засунуть эти деньги себе в задницу!"

- text: "Woah there! Relax! I was just goofing around."
  translation: "Эй, тише! Расслабься! Я просто прикалывался."
  speaker: "Trov"

- text: "Not my problem."
  translation: "Не моя проблема."

- text: "Sooo... Is that a no?"
  translation: "Та-а-ак... Это значит нет?"
  speaker: "Trov"
  rich_text: "Sooo... Is that a <i>no</i>?"
  rich_translation: "Та-а-ак... Это значит <i>нет</i>?"

- text: "Out of my way."
  translation: "Посторонись."

