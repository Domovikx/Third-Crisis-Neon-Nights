# Dialogues (path_id=2571)

- text: "Ahhh~ I can feel the aura of my concoctions. This will do nicely for a start. Give them here~"
  translation: "Аххх~ Я чувствую ауру своих зелий. Это отличное начало. Давай их сюда~"

- text: "Sure thing. So what about my reward?"
  translation: "Конечно. А как насчёт моей награды?"

- text: "Oh~ Eager for head, hm?"
  translation: "О~ Жаждешь минет, да?"

- text: "No- I mean- Your bar- thing..."
  translation: "Нет- Я имею в виду- Твой бар..."

- text: "Hmm~ Well~ It's still under some renovations... but come on in."
  translation: "Хмм~ Нуу~ Он ещё на ремонте... но заходи."
