# Dialogues (path_id=1159)

- text: "You've been practicing for me, huh?"
  translation: "Тренировался для меня, да?"

- text: "Hahah! God, you look so pathetic."
  translation: "Ха-хах! Какой же ты жалкий."

- text: "Are you close yet?"
  translation: "Уже близко?"

- text: "I mean close by, you animal. I'm at the nail salon in the Res."
  translation: "Рядом, животное. Я в ногтевом салоне в Ресе."

- text: "Is there a problem with that? Max doesn't mind."
  translation: "Проблемы? Макс не против."

- text: "Oh, you big baby. There's an alleyway nearby, I'll meet you there."
  translation: "Ох, ну ты и нытик. Рядом переулок, встретимся там."

- text: "Hmm. Nah. Shimmy all the way down here if you really want me."
  translation: "Хм. Не-а. Топать тебе сюда, если хочешь меня."

- text: "And hurry up, I don't have all day."
  translation: "И поторопись, у меня не весь день."

