# Dialogues (path_id=755)

- text: "It's pretty bad Zoey. The operating system is completely corrupted, and even some internals are fried. I don't think we're fixing this one."
  translation: "Дела плохи, Зои. Операционная система полностью повреждена, и даже кое-какие внутренности сгорели. Боюсь, эту не починить."

- text: "Anything else? Do you think someone could have done this?"
  translation: "Что-нибудь ещё? Как думаешь, кто-то мог это устроить?"

- text: "What, like a cyberattack? It would have to be a nasty little virus to get this much damage done."
  translation: "Что, вроде кибератаки? Чтобы нанести столько урона, нужен был мерзкий вирус."

- text: "My neighbor, she... Was wearing it when this happened..."
  translation: "Моя соседка, она... На ней это было надето, когда всё случилось..."

- text: "Brain burn...?"
  translation: "Выгорание мозга...?"

- text: "I'll scour the web, find out whatever I can about it. I'll let you know if anything comes up."
  translation: "Я прочешу сеть и узнаю всё, что смогу. Если что-то всплывёт — дам знать."

- text: "Thanks Lio."
  translation: "Спасибо, Лио."

- text: "Of course!"
  translation: "Конечно!"

