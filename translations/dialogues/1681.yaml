# Dialogues (path_id=1681)

- text: "There, it's open!"
  translation: "Вот, открыто!"

- text: "Purple fog! Is that-"
  translation: "Фиолетовый туман! Это-"

- text: "This mess is bigger than I thought... Get back, don't breathe it in. I'll put my mask on."
  translation: "Этот бардак серьёзнее, чем я думала... Отойди, не вдыхай. Я надену маску."
  speaker: "Klaudia"

