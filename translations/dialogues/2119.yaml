# Dialogues (path_id=2119)

- text: "You've answered the phonecall from Zoey, and you're in a down mood at work."
  translation: "Ты ответил на звонок Зои и в подавленном настроении на работе."

- text: "You're worried about Sarah, but also just want to hear her voice again."
  translation: "Ты волнуешься за Сару, но тебе также хочется просто снова услышать её голос."

- text: "Someone's noticed you talking on the phone, and you're talking to them first before talking to Zoey.A"
  translation: "Кто-то заметил, что ты разговариваешь по телефону, и ты сначала говоришь с ними, прежде чем вернуться к разговору с Зои.А"

- text: "You're disappointed, but get cut off by the phone hanging up."
  translation: "Ты разочарован, но разговор обрывается — на том конце вешают трубку."

