# Dialogues (path_id=1534)

- text: "Heh-.. S-sorry.. That's really uh.. Nice of you, but I-.. I'm really in a hurry, you know?"
  translation: "Хе-.. П-прости.. Это, эм.. правда мило с твоей стороны, но я-.. Я очень спешу, понимаешь?"

- text: "Aww, too bad..~ Next time you stop ask for Simon, don't hesistate to take me up on the offer."
  translation: "Ой, жаль..~ В следующий раз, когда зайдёшь, спроси Симона — не стесняйся принять моё предложение."
  speaker: "Bunnyboy"

