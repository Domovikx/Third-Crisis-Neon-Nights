# Dialogues (path_id=1153)

- text: "Yeah, sure. I'll help you out."
  translation: "Да, конечно. Помогу тебе."

- text: "Oh, bless you! Finally someone with a heart. Someone with an understanding for true love has graced me with their presence."
  translation: "О, благослови тебя бог! Наконец-то кто-то с душой. Тот, кто понимает настоящую любовь, почтил меня своим присутствием."

- text: "Yeah, yeah. I'll be right back."
  translation: "Да-да. Скоро вернусь."

