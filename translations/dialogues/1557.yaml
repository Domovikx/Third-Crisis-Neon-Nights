# Dialogues (path_id=1557)

- text: "No, upstairs is only for clients who booked one of my sweethearts."
  translation: "Нет, наверху только для клиентов, которые заказали одну из моих сладких."
  speaker: "Klaudia"

- text: "You know, respect for privacy and all that."
  translation: "Знаешь, уважение к личному пространству и всё такое."
  speaker: "Klaudia"

- text: "(At least she makes sure to keep their client's privacy safe.)"
  translation: "(По крайней мере, она заботится о приватности клиентов.)"
  rich_text: "<i>(At least she makes sure to keep their client's privacy safe.)</i>"
  rich_translation: "<i>(По крайней мере, она заботится о приватности клиентов.)</i>"

- text: "You could book a session with one of my bunnies.~"
  translation: "Можешь заказать сеанс с одной из моих зайчишек.~"
  speaker: "Klaudia"

- text: "They are going to take all your worries away.~"
  translation: "Они избавят тебя от всех тревог.~"
  speaker: "Klaudia"
  rich_text: "They are going to take all your <b>worries</b> away.~"
  rich_translation: "Они избавят тебя от всех <b>тревог</b>.~"

- text: "Your loss."
  translation: "Твоя потеря."
  speaker: "Klaudia"

