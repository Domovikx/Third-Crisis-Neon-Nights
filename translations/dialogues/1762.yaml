# Dialogues (path_id=1762)

- text: "Perfect! Now that my letter is complete, could you-"
  translation: "Отлично! Теперь, когда моё письмо готово, не могла бы ты—"

- text: "Yeah, I'll go give it to her. Just gimme a minute, I'll be back."
  translation: "Да, я отнесу его ей. Дай минутку, я вернусь."

- text: "You are a true saint and a scholar!"
  translation: "Ты истинная святая и учёная!"

