# Dialogues (path_id=73103)

- text: "Oh hey, Zoey! Small world- or small city, I guess."
  translation: "О, привет, Зои! Мир тесен — ну, то есть город, наверное."

- text: "Hey Max! Where ya headed?"
  translation: "Привет, Макс! Куда направляешься?"

- text: "Oh, you know. Just out and about. I was thinking of heading to the Commercial District to see if they had any scented oils."
  translation: "Ну, знаешь. Просто гуляю. Думаю заглянуть в Торговый квартал — глянуть, есть ли у них ароматические масла."

- text: "Wow! Is this for your erm... 'massages'? What kinda scents?"
  translation: "Ого! Это для твоих эмм... «массажей»? Какие ароматы?"

- text: "Oh you know~  Eau du Cum, Lemonscented Cum, Cum Rouge. Nothing like a little musk to get you cute little organics in the mood."
  translation: "О, ну ты знаешь~ Одеколон Спермы, Лимонная Сперма, Красная Сперма. Ничто так не настроит вас, милых маленьких органиков, на нужный лад, как капелька мускуса."

- text: "O-Oh! Heheh- Yeah- we're uh... simple creatures, I guess!"
  translation: "О-О! Хи-хи- Да- мы эмм... простые создания, наверное!"

- text: "Oh you so are~ But that's why I love ya. Oh- My stop's coming up, I'll see ya around, hun."
  translation: "О, точно~ Но за это я тебя и люблю. Ой- Моя остановка, ещё увидимся, дорогая."

- text: "Yeah, see ya."
  translation: "Ага, пока."

