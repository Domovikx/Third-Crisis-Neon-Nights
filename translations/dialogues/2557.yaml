# Dialogues (path_id=2557)

- text: "Hey Boss."
  translation: "Привет, Шеф."

- text: "You still got the package?"
  translation: "Посылка всё ещё у тебя?"

- text: "Safe and sound."
  translation: "Цела и невредима."

- text: "Good. Lockdown's lifted, but there's still some NAB detectives snooping around. You're going to need to come tomorrow night."
  translation: "Хорошо. Блокировку сняли, но там всё ещё шныряют детективы NAB. Тебе придётся прийти завтра ночью."

- text: "(Thank god. That'll give me time to come up with a fake blocker.)"
  translation: "(Слава богу. Это даст мне время придумать поддельный блокиратор.)"
  rich_text: "<i>(Thank god. That'll give me time to come up with a fake blocker.)</i>"
  rich_translation: "<i>(Слава богу. Это даст мне время придумать поддельный блокиратор.)</i>"

- text: "(I really shouldn't have wasted the day with Sarah.)"
  translation: "(Не стоило тратить день с Сарой.)"
  rich_text: "<i>(I really shouldn't have wasted the day with Sarah.)</i>"
  rich_translation: "<i>(Не стоило тратить день с Сарой.)</i>"

- text: "(Not that it was a waste... but-)"
  translation: "(Не то чтобы это было бесполезно... но-)"
  rich_text: "<i>(Not that it was a waste... but-)</i>"
  rich_translation: "<i>(Не то чтобы это было бесполезно... но-)</i>"

- text: "Hello? Are you even there, Madison?"
  translation: "Алло? Ты вообще здесь, Мэдисон?"

- text: "Y-Yeah! Yeah, tomorrow night. No problem! I'll keep laying low."
  translation: "Д-Да! Да, завтра ночью. Без проблем! Буду вести себя тихо."

- text: "Maybe get some ear implants while you're at it. See you then."
  translation: "Может, заодно вставь ушные импланты. Увидимся."

