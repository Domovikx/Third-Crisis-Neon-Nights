- text: "What kind of... service...?"
  translation: "Какого рода... услуга...?"

- text: "You know I like company from beautiful bunnies. Another easy ten bucks for you."
  translation: "Знаешь, мне нравятся красивые зайчики. Десять баксов за компанию."
