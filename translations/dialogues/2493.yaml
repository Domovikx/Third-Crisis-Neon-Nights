# Dialogues (path_id=2493)

- text: "Oh- They're- Just like that- In an alley- Wow-"
  translation: "О- Они- Прямо так- В переулке- Ничего себе-"

- text: "Aww, look, you've got an audience, Issac~"
  translation: "Оу, смотри, у тебя зрители, Айзек~"

- text: "Ah-! Uhm-! It's not what it looks like!!"
  translation: "А-! Эм-! Это не то, что ты думаешь!!"

- text: "Isn't it? You're balls deep in me, pretty boy. Let her watch."
  translation: "Неправда? Ты во мне по самые яйца, красавчик. Пусть смотрит."

