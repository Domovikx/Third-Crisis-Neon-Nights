# Dialogues (path_id=2607)

- text: "Do I suck?"
  translation: "Я отстой?"
  speaker: "Zoey"

- text: "N-no... You're fine. The problem's everything else."
  translation: "Н-нет... Ты в порядке. Проблема во всём остальном."

- text: "You sure? Neon City is huge. I bet we can find something you'd enjoy."
  translation: "Точно? Неоновый город огромный. Уверена, тебе что-нибудь да понравится."

- text: "I like smoking."
  translation: "Я люблю курить."

- text: "And I like taking walks with my cute neighbor."
  translation: "И я люблю гулять с моим милым соседом."
  speaker: "Zoey"

- text: "C'mon. You're pushing it."
  translation: "Да ладно. Ты перегибаешь."

- text: "Am not. And for the record, you don't suck either."
  translation: "Не перегибаю. И к слову, ты тоже не отстой."

- text: "Yeah... Sure..."
  translation: "Да-а... Конечно..."

