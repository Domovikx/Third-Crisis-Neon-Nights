# Dialogues (path_id=2056)

- text: "Hey, everything okay over here?"
  translation: "Эй, тут всё в порядке?"

- text: "Yeah... Just getting the elevator fixed up. It's really taking a while."
  translation: "Ага... Тут лифт чиню. Реально надолго."

- text: "Need any help with it?"
  translation: "Нужна помощь?"

- text: "Oh hon, I'll be fine. This is why I get paid the... well I was gonna say big bucks, but... average sized bucks is more accurate."
  translation: "О, дорогая, всё будет в порядке. Потому мне и платят... ну, я хотела сказать — большие баксы, но... средние баксы — точнее."

