# Dialogues (path_id=1563)

- text: "Hey, this isn't a recording studio! Get yourself one of my bunnies, and you can make as many videos as you like!"
  translation: "Эй, это не студия звукозаписи! Возьми одну из моих зайчишек, и снимай сколько хочешь!"
  speaker: "Klaudia"

- text: "Now make way!"
  translation: "А теперь прочь с дороги!"
  speaker: "Klaudia"
