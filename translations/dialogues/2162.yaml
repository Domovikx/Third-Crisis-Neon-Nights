# Dialogues (path_id=2162)

- text: "Hey Jaime. Glad to see you around."
  translation: "Привет, Джейми. Рада тебя видеть."

- text: "Not dead, you mean?"
  translation: "Не умерла, ты хотела сказать?"

- text: "Oh... I uhh-"
  translation: "Ой... я э-э..."

- text: "I should've just waited for the fucking maintenance kit."
  translation: "Надо было просто дождаться этого чёртова ремкомплекта."

- text: "Ugh... Sorry. I didn't mean to be an asshole."
  translation: "Уф... Прости. Не хотела быть стервой."

- text: "No worries."
  translation: "Без проблем."

- text: "See that sign on the door? Landlord won't even let me smoke in the damn hallway anymore."
  translation: "Видишь табличку на двери? Хозяйка даже в коридоре не даёт курить."

- text: "Dick move. She's always had a stick up her ass."
  translation: "Вот же сука. У неё вечно палка в заднице."

- text: "I just wanna take a load off and she won't even let me smoke. Bitch."
  translation: "Я просто хочу расслабиться, а она даже курить не даёт. Стерва."

- text: "Maybe we should go outside then. No one can stop you from smoking there."
  translation: "Может, тогда выйдем на улицу? Там тебя никто не остановит."
  speaker: "Zoey"

- text: "I don't know, Zoey. Outside is not really my thing."
  translation: "Не знаю, Зои. Улица — это не моё."

- text: "C'mon, I'll be with you. You can always tease me if you get bored."
  translation: "Давай, я буду с тобой. Сможешь подкалывать меня, если заскучаешь."
  speaker: "Zoey"

- text: "Heh... Okay. I guess I can stretch my legs a bit. Do you wanna go now?"
  translation: "Хе... Ладно. Думаю, могу немного размять ноги. Пойдём?"

