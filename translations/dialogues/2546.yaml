# Dialogues (path_id=2546)

- text: "They're still here..."
  translation: "Они всё ещё здесь..."

- text: "And they go after the citizens for loitering... So hypocritical..."
  translation: "А они преследуют граждан за безделье... Такие лицемеры..."

- text: "Shh! Sarah! Don't say that so loud!"
  translation: "Тсс! Сара! Не говори так громко!"

