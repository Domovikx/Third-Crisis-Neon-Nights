# Dialogues (path_id=2068)

- text: "Let's go to the beach sometime, Z! Get some towels. Work on our tans. It'll be fun!"
  translation: "Давай как-нибудь на пляж, З! Возьмём полотенца. Поработаем над загаром. Будет весело!"

- text: "Pff, right. Something tells me GAG would have something to say about that sort of recreation."
  translation: "Пф, конечно. Что-то подсказывает мне, что GAG будет против такого отдыха."

- text: "Screw 'em."
  translation: "Наплевать на них."

