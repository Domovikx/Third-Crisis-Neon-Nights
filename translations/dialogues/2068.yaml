# Dialogues (path_id=2068)

- text: "Let's go to the beach sometime, Z! Get some towels. Work on our tans. It'll be fun!"
  translation: "Давай как-нибудь сходим на пляж, Z! Возьмём полотенца. Позагораем. Будет весело!"

- text: "Pff, right. Something tells me GAG would have something to say about that sort of recreation."
  translation: "Пф-ф, ага. Что-то мне подсказывает, что GAG будет что сказать по поводу такого развлечения."

- text: "Screw 'em."
  translation: "Да и чёрт с ними."

