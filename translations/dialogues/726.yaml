# Dialogues (path_id=726)

- text: "Well... The way here for starters. Buncha pipes burst, so the tunnels were filled with haze."
  translation: "Ну... Для начала дорогу сюда. Лопнули трубы, и туннели заполнились дымкой."

- text: "Wha- Really? Shit, Zoey, I wouldn't have made you go through that tunnel if I knew."
  translation: "Ч- Правда? Чёрт, Зои, я бы не заставил тебя лезть в этот туннель, если бы знал."

- text: "No worries. I managed to make it in one piece thanks to the blocker."
  translation: "Не волнуйся. Мне удалось добраться целой благодаря блокиратору."

- text: "Questioning, not annoyed."
  translation: "Спрашивая, не раздражён."

