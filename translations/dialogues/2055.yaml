# Dialogues (path_id=2055)

- text: "Elevator still broken?"
  translation: "Лифт всё ещё сломан?"

- text: "Yeah, just getting it fixed up right now. This is gonna take a while."
  translation: "Ага, чиним прямо сейчас. Это надолго."

- text: "Sheesh, it really is. I saw ya when I came in here last night. Did you even take a break?"
  translation: "Ого, точно. Я видел тебя, когда вчера ночью сюда заходил. Ты хоть отдыхал?"

- text: "I can take breaks? Didn't know that."
  translation: "Я могу отдыхать? Впервые слышу."

- text: "I mean... you should be able to..."
  translation: "Ну... ты же можешь..."

- text: "That doesn't sound healthy."
  translation: "Звучит нездорово."

- text: "Neither does being homeless."
  translation: "И быть бездомным — тоже."

- text: "I know that feeling."
  translation: "Уж я-то знаю."

