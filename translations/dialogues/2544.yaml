# Dialogues (path_id=2544)

- text: "Think you could get us in that Slutbox, Z?"
  translation: "Сможешь затащить нас в тот Шлюхобокс, Зи?"

- text: "I- Well... Yeah? But why?"
  translation: "Я- Ну... Да? Но зачем?"

- text: "We could drive it by those guards and distract them. Ditch the box and then get inside. Those thugs have low attention spans."
  translation: "Можем подогнать его к охранникам и отвлечь их. Бросить ящик и проникнуть внутрь. У этих головорезов короткое внимание."

- text: "But... the door is locked..."
  translation: "Но... дверь заперта..."

- text: "It won't be after the guards are gone."
  translation: "Так не будет, когда охранники уйдут."

- text: "But... it'll unlock after we wait for the guards to go away too."
  translation: "Но... она откроется и если мы просто подождём, пока охранники уйдут."

- text: "It's up to you, Z. I trust you."
  translation: "Решать тебе, Зи. Я доверяю тебе."

