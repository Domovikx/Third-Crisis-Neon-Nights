# Dialogues (path_id=989)

- text: "Hey..! Welcome to the- Afterglow."
  translation: "Эй..! Добро пожаловать в- Afterglow."
  speaker: "Zoey"

- text: "What would you like to order...?"
  translation: "Что бы вы хотели заказать...?"

- text: "You're asking me what I want. Hah. So you're the latest trial, huh?"
  translation: "Ты спрашиваешь меня, чего я хочу. Ха. Значит, ты — последняя проба, да?"
  speaker: "Varen"
  rich_text: "You're asking <i>me</i> what I want. Hah. So you're the latest trial, huh?"
  rich_translation: "Ты спрашиваешь <i>меня</i>, чего я хочу. Ха. Значит, ты — последняя проба, да?"

- text: "Oh, sorry, yeah... First day and all, heh...!"
  translation: "Ой, извините, да... Первый день и всё такое, хе...!"

- text: "Name's Varen, bunny. I can... see why she picked you up, heh."
  translation: "Меня зовут Варен, зайка. Я... вижу, почему она тебя выбрала, хе."
  speaker: "Varen"

- text: "R-right... Uhm..."
  translation: "Д-да... Эм..."
  speaker: "Zoey"

- text: "What did you want to order?"
  translation: "Что вы хотели заказать?"
  speaker: "Zoey"

- text: "I only ever order one of two things. Neon Lime and... Company."
  translation: "Я заказываю всегда одно из двух. Неон Лайм или... Компанию."
  speaker: "Varen"

- text: "So... A Neon Lime?"
  translation: "Тогда... Неон Лайм?"
  speaker: "Zoey"

- text: "For now, sure."
  translation: "Пока что — да."
  speaker: "Varen"

- text: "Okay, I'll be right back with your order, sir."
  translation: "Хорошо, я сейчас вернусь с вашим заказом, сэр."
  speaker: "Zoey"

