# Dialogues (path_id=1745)

- text: "Yeah, sure. I'll help you out."
  translation: "Да, конечно. Я помогу."

- text: "Oh, bless you! Finally someone with a heart. Someone with an understanding for true love has graced me with their presence."
  translation: "О, благослови тебя бог! Наконец-то кто-то с сердцем. Кто-то, кто понимает истинную любовь, осчастливил меня своим присутствием."

- text: "Yeah, yeah. I'll be right back."
  translation: "Да-да. Я скоро вернусь."

