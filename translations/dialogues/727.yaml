# Dialogues (path_id=727)

- text: "Well... I sorta kinda stole it?"
  translation: "Ну... Я как бы украла его?"

- text: "Not annoyed."
  translation: "Не раздражён."

- text: "Like trying to tell your parents you did something bad but don't wanna say it."
  translation: "Как будто пытаешься сказать родителям, что сделал что-то плохое, но не хочешь признаваться."

- text: "Wh- Are you serious, Zoey? Wait, was that you that made the commotion at the Redlight District? Fuck, this is not okay!"
  translation: "Ч- Ты серьёзно, Зои? Погоди, это ты устроила переполох в Районе красных фонарей? Чёрт, это никуда не годится!"

- text: "Maybe? I just need a fake to get them off me. They want me to bring it in to them, but I can't. If I do, bad things could happen."
  translation: "Может быть? Мне просто нужна подделка, чтобы они отстали. Они хотят, чтобы я принесла им его, но я не могу. Если сделаю, могут случиться плохие вещи."

- text: "And if you don't, you're screwed. Ugh. Fuck me, alright Zoey. Just lemme see what I can do. Give me a minute."
  translation: "А если не сделаешь, ты в пролёте. Угх. Чёрт возьми, ладно Зои. Дай посмотреть, что я могу сделать. Дай мне минуту."

