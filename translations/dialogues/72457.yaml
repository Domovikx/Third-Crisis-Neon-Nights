# Dialogues (path_id=72457)

- text: "Are those... potions?"
  translation: "Это... зелья?"

- text: "Hmm? Oh, of course. Always smart to keep those ones on me. Never know when I'll need them."
  translation: "М? О, конечно. Всегда умно держать их при себе. Никогда не знаешь, когда понадобятся."

- text: "Okay... and what do those ones do...?"
  translation: "Ладно... а те что делают...?"

- text: "That's on a need to know basis."
  translation: "Это по мере необходимости."

