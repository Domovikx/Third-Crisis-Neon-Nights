# Dialogues (path_id=72460)

- text: "You're married?"
  translation: "Ты замужем?"

- text: "Yeah! You'd love him, he's a treat. You got a hubby too?"
  translation: "Да! Он бы тебе понравился — душка. А у тебя тоже муж есть?"

- text: "Poor girl. Hopefully you get some time soon. I've got brews that can help with dating."
  translation: "Бедняжка. Надеюсь, у тебя скоро время появится. У меня есть зелья, что помогут с романтикой."

- text: "Wh- Like a love potion?"
  translation: "Ч- Вроде приворота?"

- text: "Something like that~"
  translation: "Что-то вроде того~"

- text: "Oh yeah~? Girls are lovely too~ You got a wifey then?"
  translation: "О да~? Девочки тоже ничего~ Значит, у тебя жёнушка есть?"

