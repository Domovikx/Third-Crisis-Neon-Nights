# Dialogues (path_id=2563)

- text: "You're feeling real melancholy right now, self-reflecting."
  translation: "Ты сейчас в глубокой меланхолии, копаешься в себе."

- text: "(How long's it been since the Crisis? Two years, I guess? Feels like life's stopped ever since then. Two years of... just trying to hold on to what's left.)"
  translation: "(Сколько прошло с Кризиса? Два года, наверное? Кажется, жизнь остановилась с тех пор. Два года... просто пытаться удержать то, что осталось.)"
  rich_text: "<i>(How long's it been since the Crisis? Two years, I guess? Feels like life's stopped ever since then. Two years of... just trying to hold on to what's left.)</i>"
  rich_translation: "<i>(Сколько прошло с Кризиса? Два года, наверное? Кажется, жизнь остановилась с тех пор. Два года... просто пытаться удержать то, что осталось.)</i>"

- text: "(Trying not to scratch the itch.)"
  translation: "(Стараешься не поддаться порыву.)"

- text: "feeling hopeless, longing for better times"
  translation: "чувствуя безнадёжность, тоскуя по лучшим временам"

- text: "self-hatred just starting to barely bubble over"
  translation: "самоненависть только начинает едва пробиваться"

- text: "now it's really bubbling over."
  translation: "теперь она действительно вырывается наружу."

- text: "now the rage is simmering down into despair"
  translation: "теперь гнев затихает, переходя в отчаяние"

- text: "imagine you're saying your biggest insecurity outloud."
  translation: "Представь, как произносишь вслух свою главную слабость."

- text: "hopelessly trying to push yourself forward, feels like the wind is knocked out of you."
  translation: "Безнадёжно пытаешься двигаться дальше, будто у тебя перехватило дыхание."

- text: "saying it weakly, like you don't even believe in your little motivational saying anymore. a tear is streaming down your face."
  translation: "Говоришь это слабо, будто уже и сам не веришь в свою маленькую мотивационную фразу. По щеке течёт слеза."

