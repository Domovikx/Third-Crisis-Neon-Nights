# Dialogues (path_id=386)

- text: "Were you listening?"
  translation: "Ты подслушивала?"

- text: "I- um..."
  translation: "Я- эм..."

- text: "How about you mind your own business!"
  translation: "А не заняться ли тебе своими делами!"

- text: "Sorry, I didn't mean to."
  translation: "Прости, я не хотела."

- text: "Yeah, yeah, whatever, I don't have time for you."
  translation: "Ага, ага, как скажешь, у меня нет на тебя времени."

- text: "What is this place?"
  translation: "Что это за место?"

- text: "I told you! It's the Witch's Cauldron. I'm the witch by the way if that wasn't obvious already."
  translation: "Я же сказала! Это Ведьмин Котёл. Я ведьма, кстати, если это ещё не было очевидно."

- text: "Yeah, I sorta figured."
  translation: "Ага, я так и поняла."
  speaker: "Zoey"

- text: "The hat gave it away, huh?"
  translation: "Шляпа выдала, да?"

