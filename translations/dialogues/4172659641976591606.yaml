# Dialogues (path_id=4172659641976591606)

- text: "I love your sparkly stocking!"
  translation: "Мне нравятся твои блестящие чулочки!"

- text: "Thanks, hun! Yeah, I made some changes to the work uniform I was given. Glad you noticed!"
  translation: "Спасибо, милашка! Да, я немного изменила рабочую форму, которую мне выдали. Рада, что ты заметила!"

- text: "So you did that yourself?"
  translation: "Ты сама это сделала?"

- text: "Yeah! I'm a huge believer in crafting my own look. It lets me have my own personal aesthetic, you know?"
  translation: "Ага! Я верю в создание собственного образа. Это позволяет мне иметь свою личную эстетику, понимаешь?"

- text: "no one else can make me me (as in make me like myself)"
  translation: "никто другой не может сделать меня собой (в смысле, чтобы я себе нравилась)"

- text: "That's a really beautiful philosophy."
  translation: "Это действительно прекрасная философия."

- text: "I'm glad you think so, cutie!"
  translation: "Рада, что ты так думаешь, красотка!"

