# Dialogues (path_id=72985)

- text: "I love your sparkly stocking!"
  translation: "Обожаю твой блестящий чулок!"

- text: "Thanks, hun! Yeah, I made some changes to the work uniform I was given. Glad you noticed!"
  translation: "Спасибо, зайка! Да, я немного изменила рабочую форму, что мне выдали. Рада, что ты заметила!"

- text: "So you did that yourself?"
  translation: "Ты сама это сделала?"

- text: "Yeah! I'm a huge believer in crafting my own look. It lets me have my own personal aesthetic, you know?"
  translation: "Ага! Я считаю, что образ нужно создавать самой. Это позволяет сохранить свою эстетику, понимаешь?"

- text: "no one else can make me me (as in make me like myself)"
  translation: "никто другой не может сделать меня мной (в смысле, помочь мне нравиться себе)"

- text: "That's a really beautiful philosophy."
  translation: "Это прекрасная философия."

- text: "I'm glad you think so, cutie!"
  translation: "Рада, что ты так думаешь, милашка!"

