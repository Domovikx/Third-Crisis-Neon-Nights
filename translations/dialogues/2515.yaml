# Dialogues (path_id=2515)

- text: "(It's a lot of money for just wearing an outfit... Maybe I wouldn't need to ask Sarah for help so much...)"
  translation: "(Это куча денег просто за то, чтобы надеть наряд... Может, не придётся так часто просить Сару о помощи...)"
  speaker: "Zoey"
  rich_text: "<i>(It's a <b>lot</b> of money for just wearing an outfit... Maybe I wouldn't need to ask Sarah for help so much...)</i>"
  rich_translation: "<i>(Это <b>куча</b> денег просто за то, чтобы надеть наряд... Может, не придётся так часто просить Сару о помощи...)</i>"

- text: "Let's say I was interested... What would I need to do?"
  translation: "Допустим, мне интересно... Что нужно делать?"
  speaker: "Zoey"
  rich_text: "Let's say I <b>was</b> interested... What would I need to do?"
  rich_translation: "Допустим, мне <b>интересно</b>... Что нужно делать?"

- text: "Just slip in and lean over so I can get the proof he wants."
  translation: "Просто надеть и наклониться, чтобы я получил доказательство, которое он хочет."

- text: "That's... It?"
  translation: "И... Всё?"
  speaker: "Zoey"

- text: "Get me my proof and you get your money."
  translation: "Даёшь мне доказательство — получаешь деньги."

- text: "(Just an outfit... Nothing crazy... And it's quick money... This makes sense.)"
  translation: "(Просто наряд... Ничего безумного... И быстрые деньги... В этом есть смысл.)"
  speaker: "Zoey"
  rich_text: "<i>(Just an outfit... Nothing crazy... And it's quick money... This makes sense.)</i>"
  rich_translation: "<i>(Просто наряд... Ничего безумного... И быстрые деньги... В этом есть смысл.)</i>"

- text: "Alright, fine. I'll do it."
  translation: "Ладно, хорошо. Я согласна."
  speaker: "Zoey"

- text: "Outfit is in the box. Go and slip in."
  translation: "Наряд в коробке. Иди надевай."
