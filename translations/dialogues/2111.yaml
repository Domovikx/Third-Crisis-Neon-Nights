# Dialogues (path_id=2111)

- text: "Aghh- What time is it?"
  translation: "Агх- Который час?"

- text: "Time to wake up."
  translation: "Пора просыпаться."

- text: "Haw haw! Any plans today, super spy?"
  translation: "Ха-ха! Какие планы на сегодня, супершпионка?"

- text: "Well. No, not really. I've got a meeting with my broker in the Redlight District, but-"
  translation: "Ну. Нет, не особо. У меня встреча с брокером в Районе красных фонарей, но-"

- text: "But they blocked off the Redlight District. I saw the guards when I was heading over."
  translation: "Но Район красных фонарей перекрыли. Я видела охрану, когда шла сюда."

- text: "Right... So... I've been told to just wait until that lockdown is over."
  translation: "Точно... Ну... Мне сказали просто ждать, пока не снимут блокпост."

- text: "Wait! So you finally have some free time?! Oh my gosh, we HAVE to have a girl's day out!"
  translation: "Погоди! То есть у тебя наконец-то есть свободное время?! О боже, нам СРОЧНО нужно устроить девичник!"

- text: "It's been a while."
  translation: "Давненько не было."

- text: "Yeah, we should. It's been a while since we got to spend some time."
  translation: "Да, надо бы. Давненько мы не проводили время вместе."

- text: "That's what I'm saying! I know just the place too! There's a nail salon near your place I've been wanting to check out. You heard of it?"
  translation: "Вот и я о том же! И я знаю, куда пойти! Тут рядом с тобой есть нейл-салон, я давно хочу в него заглянуть. Слышала о нём?"

- text: "Heh, sounds like you have a plan. What'd you'd have in mind?"
  translation: "Хех, похоже у тебя есть план. Что ты задумала?"

- text: "Wellll~ I've been wanting to get my nails done at that fancy salon near here. You ever been there before?"
  translation: "Ну-у~ Я хочу сделать ногти в том модном салоне неподалёку. Ты там была?"

- text: "There's a salon near my place?"
  translation: "Рядом с моим домом есть салон?"

- text: "Sarah Dialogue Preset"
  translation: "Сара Диалог Пресет"
  speaker: "Pouting"

- text: "I'll take that as a no."
  translation: "Сочту это за «нет»."

- text: "You sure that place is in my price range? I don't really have a lot of fuckbucks for a fancy salon."
  translation: "Уверена, что это место мне по карману? У меня не много трах-баксов на модный салон."

- text: "It'll be my treat! You're gonna like it whether you like it or not."
  translation: "Я угощаю! Тебе понравится, хочешь ты того или нет."

- text: "Don't you have work soon?"
  translation: "А у тебя скоро работа?"

- text: "And miss out on this rare bit of free time with my bestie? I can afford being late for you, Z!"
  translation: "И пропустить редкую возможность побыть с моей лучшей подругой? Я могу позволить себе опоздать ради тебя, Зи!"

- text: "Heh. If you say so! Let's get dressed and head out then."
  translation: "Хех. Как скажешь! Тогда одеваемся и выходим."

- text: "Uhhh, Z. Look behind you."
  translation: "Э-э, Зи. Посмотри назад."

