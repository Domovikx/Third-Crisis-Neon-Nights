# Dialogues (path_id=73822)

- text: "Hey- you. Over here."
  translation: "Эй- ты. Сюда."

- text: "Yeah? What do you need?"
  translation: "Да? Что тебе нужно?"

- text: "I'm working on something that could improve quality of life for citizens of Neon City. Need someone to help me gather data."
  translation: "Я работаю над кое-чем, что улучшит качество жизни граждан Неон-Сити. Нужен кто-то, кто поможет собрать данные."

- text: "Really? Well- What do you need?"
  translation: "Правда? И- что нужно?"

- text: "Hm. Been looking into ways to help make the itch easier to deal with, but I need a subject deeply affected by it to test."
  translation: "Хм. Ищу способы облегчить этот зуд, но мне нужен испытуемый, которого он сильно затронул."

- text: "Wait-... you want me to-"
  translation: "Погоди-... ты хочешь, чтобы я-"

- text: "Get horny. Yes."
  translation: "Возбудилась. Да."

- text: "I- um... I'm not sure if I'm really the one to ask for... that."
  translation: "Я- эм... Не уверена, что я та, кого стоит просить о... таком."

- text: "Ah, come on. I'm sure you'll be able to find a way. Come back when you're really feeling it. There'll be pay in it for you."
  translation: "Ах, да ладно. Уверен, ты найдёшь способ. Возвращайся, когда действительно почувствуешь это. Заплачу."

