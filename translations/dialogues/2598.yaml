# Dialogues (path_id=2598)

- text: "How were you able to help this one?"
  translation: "Как ты смогла помочь мне?"

- text: "Oh I uh... had to be a little more open than usual with someone."
  translation: "О, я эм... пришлось быть более откровенной с одним человеком, чем обычно."

- text: "Then they gave me the battery and I was able to help you with it."
  translation: "И тогда они дали мне батарею, и я смогла помочь тебе."

- text: "This one is very grateful for your selflessness. Thank you."
  translation: "Я очень благодарна за твою самоотверженность. Спасибо."

- text: "Don't mention it."
  translation: "Не за что."

