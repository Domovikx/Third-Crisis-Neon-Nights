# Dialogues (path_id=2110)

- text: "I heard ya talkin' while I was in the shower. How'd that call go?"
  translation: "Я слышала, как ты разговаривала, пока я была в душе. Ну что, как прошёл звонок?"

- text: "Well I'm not dead yet, so... pretty good?"
  translation: "Ну, я пока не умерла, так что... вроде норм?"

- text: "That's the spirit!"
  translation: "Вот это настрой!"

- text: "Yeah, well... We'll see how the Cartel reacts to me coming back empty handed."
  translation: "Да, ну... Посмотрим, как Картель отреагирует, когда я вернусь с пустыми руками."

- text: "So you're not going to give the thingie to them?"
  translation: "Так ты не отдашь им эту штуковину?"

- text: "Yeah, guess not. No big score for me. I'll be lucky if I even survive."
  translation: "Ага, наверное, нет. Большого куша мне не видать. Буду рада, если просто выживу."

- text: "Who needs big scores when you've got a bestie like me? I can cover your bills, super spy. I've got daddy's money, remember?"
  translation: "Кому нужны большие куши, если у тебя есть лучшая подруга вроде меня? Я могу оплатить твои счета, суперагент. У меня папочкины деньги, помнишь?"

- text: "Yeah... I guess I'll need some more help from you then..."
  translation: "Да... Похоже, мне понадобится ещё немного твоей помощи тогда..."

- text: "Oh chin up, Z! Those big overdue bills are a thing of the past!"
  translation: "Эй, взбодрись, З! Те просроченные счета уже в прошлом!"

- text: "Sorry for being a burden."
  translation: "Прости, что я обуза."

- text: "Sorry I'm being such a burden to you, Sarah. I'm trying my best, I swear. It just seems like nothing is working out."
  translation: "Прости, что я такая обуза для тебя, Сара. Я стараюсь изо всех сил, клянусь. Просто кажется, что ничего не получается."

- text: "Aw, bestie. You're not a burden. Promise."
  translation: "Ой, подруга. Ты не обуза. Обещаю."

- text: "Thank you. Really. I'll pay ya back, Just need a decent contract-"
  translation: "Спасибо. Серьёзно. Я отдам тебе долг, нужен только приличный контракт-"

- text: "You saw those, huh?"
  translation: "Ты их видела, да?"

- text: "How couldn't I? Your mailbox looked like it was going to fly off the hinges with all the mail your landlord is sending you. Biatch."
  translation: "Как я могла не заметить? Твой почтовый ящик выглядел так, будто вот-вот улетит с петель от всей той почты, что шлёт твой арендодатель. Стерва."

- text: "I mean... She has a point... I just can't keep up."
  translation: "Ну... Она права... Я просто не успеваю."

- text: "Hey. No more worryin' about stuff allowed."
  translation: "Эй. Хватит волноваться из-за всякой ерунды."

- text: "Heh, can't promise that."
  translation: "Хех, не могу обещать."

- text: "I know. Hey, can I crash here tonight? It started rainin' out there when I got here and I don't want my hair getting messed up."
  translation: "Знаю. Слушай, можно я у тебя сегодня переночую? Начался дождь, а я не хочу, чтоб мои волосы растрепались."

- text: "Yeah of course! You pay more rent than me anyways. But since when have you cared about your hair that much?"
  translation: "Конечно! Ты и так платишь больше меня за аренду. Но с каких пор ты так переживаешь за свои волосы?"

- text: "Since right now."
  translation: "С этой секунды."

- text: "Heheh... Well, I'm gonna get some sleep. I need it after all the excitement today."
  translation: "Хе-хе... Ну, пойду-ка спать. После всего, что сегодня случилось, мне это нужно."

- text: "Sounds like it's sleepover time!"
  translation: "Похоже, время ночевать!"

