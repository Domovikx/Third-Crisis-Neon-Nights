# Dialogues (path_id=72982)

- text: "Whoa, your hair is changing colors!"
  translation: "Ого, твои волосы меняют цвет!"

- text: "Aw, glad you noticed, hun! Yeah, I can never really decide on what color I want, so I just let my hair emitters cycle."
  translation: "Оу, рада, что ты заметила, зайка! Ага, я никогда не могу определиться с цветом, так что просто даю эмиттерам волос переключаться."

- text: "Sometimes I wish I could just instantly change hair colors. Would save a bunch on hair dye."
  translation: "Иногда я хочу, чтобы можно было мгновенно менять цвет волос. Сэкономило бы кучу краски."

- text: "Awh, yeah I bet it's more of an issue for an organic person to mod hair emitters into their head."
  translation: "Ох, да, органику, наверное, сложнее вживить эмиттеры в голову."

- text: "The butterflies are a really nice touch too! How'd ya make that happen?"
  translation: "Бабочки — тоже отличная деталь! Как ты это сделала?"

- text: "Just a little DIY modification I did to my hair emitters! Glad you like them, hun!"
  translation: "Небольшая модификация эмиттеров волос! Рада, что тебе нравится, зайка!"

