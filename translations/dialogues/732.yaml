# Dialogues (path_id=732)

- text: "Go find her. I'll call ahead and let her know you're on the way. Once you've got the stuff from her, we can put your fake together."
  translation: "Найди её. Я позвоню и предупрежу, что ты идёшь. Как получишь от неё материал, сможем собрать твою подделку."

- text: "Thanks, Lio. I'll let ya know when I've got what you need."
  translation: "Спасибо, Лио. Дам знать, когда будет то, что нужно."

- text: "Oh, also I took the liberty of putting your ID into the database here, so you can come and go as you please without those musky tunnels."
  translation: "О, и ещё я позволил себе внести твой ID в базу, так что сможешь приходить и уходить без этих душных туннелей."

- text: "W- You couldn't have done that earlier?"
  translation: "Ч- Ты не мог сделать это раньше?"

- text: "No, sorry. Needed you here to get an up-to-date imprint of your bio-signature. Hope that's okay."
  translation: "Нет, прости. Нужно было, чтобы ты была здесь для свежего слепка твоей биоподписи. Надеюсь, это нормально."

- text: "My... bio-signature?"
  translation: "Мою... биоподпись?"

- text: "Purely for practical purposes of course."
  translation: "Исключительно в практических целях, разумеется."

- text: "embarrassed laugh"
  translation: "смущённый смех"

- text: "Enjoy the Redlight District!"
  translation: "Наслаждайся Кварталом Красных Фонарей!"

