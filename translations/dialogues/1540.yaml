# Dialogues (path_id=1540)

- text: "Wow! Cleaning goes so much quicker when I'm not alone!"
  translation: "Ого! Убираться намного быстрее, когда я не один!"
  speaker: "Bunnyboy"

- text: "Whew, yay, we did it!"
  translation: "Фух, ура, мы справились!"
  speaker: "Zoey"

- text: "Now that you've helped me, what can I do to help repay my debt to you?~"
  translation: "Раз ты помогла мне, чем я могу вернуть тебе должок?~"
  speaker: "Bunnyboy"

- text: "Well, let's be real.. You didn't do this purely out of kind-heartedness, now did you, hmm?~"
  translation: "Ну, будем честны.. Ты ведь не просто из доброты душевной помогала, верно, хм?~"
  speaker: "Bunnyboy"

- text: "Cleaning some of the sweat off your skin sounds like just the right form of repayment to me, ehehe..~"
  translation: "Смыть пот с твоей кожи — вот лучшая плата, по-моему, хихи..~"
  speaker: "Bunnyboy"

