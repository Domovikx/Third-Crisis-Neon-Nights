# Dialogues (path_id=2037)

- text: "You are loved, you are appreciated, you are enough. Do not let anyone tell you otherwise, especially not yourself."
  translation: "Тебя любят, тебя ценят, ты достаточна. Не позволяй никому убеждать тебя в обратном, особенно себе."
