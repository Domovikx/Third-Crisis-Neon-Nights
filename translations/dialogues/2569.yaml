# Dialogues (path_id=2569)

- text: "Yes~ Perfect, perfect. This is just what I needed."
  translation: "Да~ Прекрасно, прекрасно. Именно то, что мне было нужно."

- text: "What's in it?"
  translation: "Что внутри?"

- text: "The fruits of my labor, you'll see soon enough."
  translation: "Плоды моих трудов, скоро сама всё увидишь."

- text: "Okay... so now what?"
  translation: "Ладно... и что теперь?"

- text: "Now I need more concoctions, darling~ Run along now, go find more! I'll be finishing up my new Cauldron location in the meantime."
  translation: "Теперь мне нужно больше зелий, дорогуша~ Давай, беги, ищи ещё! А я пока обустрою новый Котёл."

- text: "In that tiny kiosk? What more could you possibly need to setup?"
  translation: "В этой крошечной будке? Что тебе ещё нужно установить?"

- text: "Fufufu, oh just you wait. Sometimes the greatest experiences are found in the... tightest places..."
  translation: "Фуфуфу, о, потерпи. Иногда лучшие удовольствия находятся в самых... тесных местах..."

- text: "Heh- I uh- I'm gonna go find those concoctions now. Bye!"
  translation: "Хех- я э- ладно, пойду искать зелья. Пока!"

