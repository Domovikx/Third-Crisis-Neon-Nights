# Dialogues (path_id=730)

- text: "Nova. Alright. Where can I find her?"
  translation: "Нова. Хорошо. Где мне её найти?"

- text: "She's got a gig pulling security for the Glowing Hole. I'm sure you know where to find it."
  translation: "У неё подработка — охрана «Сияющей Дыры». Уверен, ты знаешь, где это."

- text: "Yep. I know where that is alright."
  translation: "Ага. Я знаю, где это."

