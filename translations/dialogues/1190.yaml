# Dialogues (path_id=1190)

- text: "Sad / in thoughts"
  translation: "Грустная / задумчивая"

- text: "She said she was sent a recording of her in one of my massage rooms!"
  translation: "Она сказала, что ей прислали запись из одной из моих массажных комнат!"

- text: "Like... someone recorded her?"
  translation: "То есть... её кто-то снял?"
  speaker: "Zoey"

- text: "I guess so. She didn't show me the video. I don't know how that could have happened. I'm always watching out for everyone's privacy."
  translation: "Наверное. Она не показала мне видео. Я не знаю, как это могло произойти. Я всегда слежу за конфиденциальностью."

- text: "I'm sure you do. So sorry to hear that happened. Should I maybe have a look around back, see if I can find anything?"
  translation: "Я уверена. Мне жаль, что так вышло. Может, мне осмотреть подсобку, вдруг я что-то найду?"
  speaker: "Zoey"

- text: "Aww, that's so sweet of you! I already looked around back there, but maybe you can find something I couldn't."
  translation: "Ах, как это мило! Я уже осматривала подсобку, но может ты найдёшь то, чего я не нашла."

- text: "I'll see what I can find!"
  translation: "Я посмотрю, что смогу найти!"

- text: "Thank you so much, hun."
  translation: "Спасибо большое, милая."

- text: "No worries!"
  translation: "Не за что!"
