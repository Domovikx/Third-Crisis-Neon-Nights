# Dialogues (path_id=1764)

- text: "Hey, darling. Back already? How's my secret admirer doing?"
  translation: "О, дорогуша. Уже вернулась? Как там мой тайный поклонник?"

- text: "Yeah, he uh... wrote a letter for you."
  translation: "Ага, он, эм... написал тебе письмо."

- text: "Oh- Well I can't read too well, hun. What'd he say in it?"
  translation: "О- Ну я не очень-то читаю, милая. Что там было?"

- text: "Oh- Uh... He's asking you on a date. Apparently he made eye contact with you one time."
  translation: "О- Эм... Он зовёт тебя на свидание. Видимо, он один раз встретился с тобой взглядом."

- text: "Oh, Mark? I know him. That guy was hootin' and hollarin' at one of my shows. Talkin' about true love. Ah, he was a darlin'."
  translation: "О, Марк? Я его знаю. Этот тип орал на одном из моих шоу. Трепался про вечную любовь. Ах, он был душка."

- text: "And that got him thrown out?"
  translation: "И его за это вышвырнули?"

- text: "Well, Klaudia can only take so much of a guy screaming \"Awooga!\" at the top of his lungs before she snaps."
  translation: "Ну, Клавдия может терпеть лишь до тех пор, пока какой-нибудь тип не начнёт вопить «У-у-у!» во всё горло — а потом она срывается."

- text: "I'll go find him after I'm done my shift, but until then. You take a picture of this and go show it to him for me in the meantime."
  translation: "Я найду его после смены, а пока. Сфоткай это и покажи ему за меня."

- text: "Picture? Of what-"
  translation: "Фотку? Чего-"

