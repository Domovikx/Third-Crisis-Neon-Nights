# Dialogues (path_id=72454)

- text: "Are those bunny ears?"
  translation: "Это заячьи уши?"

- text: "So observant! What, never seen bunny ears before?"
  translation: "Какая наблюдательная! Что, никогда не видела заячьих ушей?"

- text: "Well... yeah, at the Glowing Hole, but none of them looked that... lifelike."
  translation: "Ну... да, в Сияющей Дыре, но ни одни не выглядели так... реалистично."

- text: "Oh you mean Klaudia and her ilk? They got that look from me! Still waiting on the royalties from her too. Bitch."
  translation: "А, ты про Клавдию и ей подобных? Они этот образ взяли у меня! До сих пор жду от неё отчислений. Стерва."

- text: "Okay... touchy subject..."
  translation: "Ладно... больная тема..."
  speaker: "Zoey"

