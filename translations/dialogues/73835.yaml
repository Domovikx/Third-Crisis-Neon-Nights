# Dialogues (path_id=73835)

- text: "Agh- Where is it?!"
  translation: "Ах- Где он?!"

- text: "Uhh... Where's what?"
  translation: "Эм... Где что?"

- text: "My phone, my phone! I lost my phone! Can't remember where I dropped it. Can you help me? Please? I'll pay!"
  translation: "Мой телефон, мой телефон! Я потеряла телефон! Не могу вспомнить, где уронила. Поможешь мне? Пожалуйста? Я заплачу!"

- text: "Heh. Of course I'll help! Any idea what it looks like?"
  translation: "Хе. Конечно, помогу! Представляешь, как он выглядит?"

- text: "Well... it looks kinda like..."
  translation: "Ну... он выглядит примерно как..."
