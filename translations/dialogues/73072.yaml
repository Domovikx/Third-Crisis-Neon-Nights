# Dialogues (path_id=73072)

- text: "How's work been?"
  translation: "Как работа?"

- text: "Ugh. Same old, same old. Working for GAG is such a damn slog. Not like I want to work for them, but try telling your dad \"no\" when he's the fucking mayor."
  translation: "Уф. Всё то же, всё то же. Работать на GAG — такая тоска. Не то чтобы я туда хотела, но попробуй скажи «нет» папе, когда он, чёрт возьми, мэр."

- text: "What would you do for work if you had the choice?"
  translation: "Кем бы ты работала, если бы был выбор?"

- text: "Something that lets me sit on the couch at home."
  translation: "Что-нибудь, где можно сидеть дома на диване."

- text: "You're a wise woman."
  translation: "Мудрая ты женщина."

- text: "playfully joking"
  translation: "игриво шучу"

