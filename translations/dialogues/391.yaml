# Dialogues (path_id=391)

- text: "(People are filthy... )"
  translation: "(Люди такие грязные...)"
  rich_text: "<i>(People are filthy... )</i>"
  rich_translation: "<i>(Люди такие грязные...)</i>"

- text: "How... did you fit all this in that kiosk?"
  translation: "И как... ты умудрился уместить всё это в ларьке?"

- text: "Hmmm... Very carefully. It's still a work in progress. But it's gonna look great when it's done."
  translation: "Хм-м... Очень аккуратно. Всё ещё в процессе, но когда будет готово — будет шикарно."

- text: "You'll be able to come here using any of my vending machines you find."
  translation: "Ты сможешь прийти сюда через любой из моих автоматов, что найдёшь."

- text: "W- How?"
  translation: "К- Как?"

- text: "Like I said, I have my ways. Now feel free to look around. We're not quite ready for business yet, but once we are, you'll know."
  translation: "Как я и говорил, у меня свои способы. Не стесняйся, осмотрись. Мы пока не готовы к открытию, но когда будем — узнаешь."

