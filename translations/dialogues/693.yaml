# Dialogues (path_id=693)

- text: "My bed is made of Marabou down. I could show you how amazingly soft it is, if you'd like, darling."
  translation: "Моя кровать из марабу. Я могла бы показать тебе, какая она невероятно мягкая, если хочешь, дорогая."
  speaker: "Leona"

- text: "Ah- uhm, th-thanks! Maybe-... Another visit...!"
  translation: "А- эм, с-спасибо! Может-... В другой раз...!"
  speaker: "Zoey"

- text: "Let me know if you change your mind."
  translation: "Дай знать, если передумаешь."
  speaker: "Leona"

