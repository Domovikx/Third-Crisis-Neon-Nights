# Dialogues (path_id=1259)

- text: "What on earth did they do to you? The wiring's all messed up."
  translation: "Что они с тобой сделали? Вся проводка перепутана."

- text: "Can you do anything about it?"
  translation: "Ты можешь что-нибудь сделать?"

- text: "Hm... Yeah, give me a second. Maybe I can..."
  translation: "Хм... Да, дай секунду. Возможно, я смогу..."

