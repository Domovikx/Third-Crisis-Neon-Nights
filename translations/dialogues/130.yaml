# Dialogues (path_id=130)

- text: "Ever take a peek at what's on these screens?"
  translation: "Заглядываешь когда-нибудь, что на этих экранах?"

- text: "Hey! Sarah! Don't mess with 'em!"
  translation: "Эй! Сара! Не трогай их!"

- text: "Pfff- No one's gonna see anyway~"
  translation: "Пф- Всё равно никто не увидит~"

- text: "So what's on them?"
  translation: "Так что там на них?"

- text: "... Whole lotta nothin'."
  translation: "... Да ничего особенного."

