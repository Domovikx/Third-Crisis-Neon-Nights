# Dialogues (path_id=1208)

- text: "I-... Here! Take my phone, you can look at the messages they send me!"
  translation: "Я-... Вот! Возьми мой телефон, посмотри сообщения, что они мне присылают!"

- text: ">> Message #23 - 03:23am"
  translation: ">> Сообщение #23 - 03:23"

- text: ">> Message #24 - 06:24am"
  translation: ">> Сообщение #24 - 06:24"

- text: ">> Message #25 - 09:11am"
  translation: ">> Сообщение #25 - 09:11"

- text: "(That is how those Cartel pervs text... and it does line up with what he's saying...)"
  translation: "(Вот как эти картельные извращенцы переписываются... и это сходится с его словами...)"
  rich_text: "<i>(That is how those Cartel pervs text... and it does line up with what he's saying...)</i>"
  rich_translation: "<i>(Вот как эти картельные извращенцы переписываются... и это сходится с его словами...)</i>"

- text: "I... I got a loan to keep the power so San could charge every day. It's all my fault..."
  translation: "Я... Я взяла кредит на свет, чтобы Сэн заряжался каждый день. Я во всём виновата..."

- text: "Please... If I can manage to get some recordings to sell well, this could all be over and I could have my San back... I just... I just need a few more days!"
  translation: "Пожалуйста... Если я смогу хорошо продавать записи, всё это кончится, и я верну своего Сэна... Мне просто... мне просто нужно ещё несколько дней!"

- text: "Insecure about lying to max"
  translation: "Неуверенность во лжи Макс"

- text: "Worried about San"
  translation: "Волнение за Сэна"

