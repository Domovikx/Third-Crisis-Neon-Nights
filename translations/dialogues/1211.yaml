# Dialogues (path_id=1211)

- text: "Long story short, there's a secret room with recording equipment."
  translation: "Короче говоря, там есть секретная комната с записывающим оборудованием."
  speaker: "Zoey"

- text: "Oh, wow. That is a lot."
  translation: "Ого, вот это да."

- text: "So Klark's girlfriend is in trouble then?"
  translation: "Значит, девушка Кларка в беде?"

- text: "Well... Yeah, but that doesn't justify secretly recording your customers, right?"
  translation: "Ну... Да, но это не оправдывает тайную запись клиентов, верно?"

- text: "Of course, but I can't just let the Cartel dismantle his girlfriend either."
  translation: "Конечно, но я не могу просто позволить Картелю расправиться с его девушкой."

- text: "They just want recordings right? I think I might have an idea on what to do here."
  translation: "Им нужны только записи, верно? Думаю, у меня есть идея, что тут можно сделать."

- text: "Show me that room. I want to talk to Klark."
  translation: "Покажи мне ту комнату. Я хочу поговорить с Кларком."

