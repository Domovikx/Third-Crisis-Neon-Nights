# Dialogues (path_id=2551)

- text: "Oh, come on, Z. We'll be fine. Onward and upward, right?"
  translation: "Ой, да ладно, Зи. Всё будет хорошо. Вперёд и вверх, да?"

- text: "This is all my fault..."
  translation: "Это всё моя вина..."

- text: "Try not to say that too loud! Let's just head down to the salon."
  translation: "Постарайся не говорить это так громко! Давай просто пойдём в салон."

