# Dialogues (path_id=1150)

- text: "Aww~ Covering up so soon~?"
  translation: "Оу~ Уже закрываешься~?"

- text: "Err- Yeah I uh... Sorry!"
  translation: "Э- Ну да, я э... Извини!"

- text: "Oh don't apologize. It's a nice change of pace to get a free show. Especially from a girl with such a cute butt."
  translation: "Ой, не извиняйся. Приятное разнообразие — бесплатное шоу. Особенно от девушки с такой милой попкой."

- text: "Oh- Uh- Thanks?"
  translation: "О- Э- Спасибо?"

- text: "Anytime, darling. And I really mean ANY time."
  translation: "В любое время, дорогая. И я серьёзно — в ЛЮБОЕ ВРЕМЯ."

