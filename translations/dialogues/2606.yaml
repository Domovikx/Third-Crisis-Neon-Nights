# Dialogues (path_id=2606)

- text: "I'm just so fucking ticked, you know?"
  translation: "Я просто в бешенстве, понимаешь?"

- text: "I need that fucking headset. I can't go months without one. I do everything in VR."
  translation: "Мне нужен этот грёбаный шлем. Я не могу без него месяцами. Я всё делаю в VR."

- text: "I can't see any way around it."
  translation: "Я не вижу другого выхода."

- text: "Please don't say that. I can't do it. Everything fucking sucks out here."
  translation: "Не говори так. Я не могу это сделать. Тут всё просто отстой."

