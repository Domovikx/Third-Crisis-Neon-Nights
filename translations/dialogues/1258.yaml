# Dialogues (path_id=1258)

- text: "It seems terrified."
  translation: "Похоже, он напуган."

- text: "Awwh... Did those big mean enforcers scare you, little one?"
  translation: "Оуу... Эти большие злые стражи напугали тебя, малыш?"

- text: "It's okay now, Auntie Sarah's here. I'm not gonna let 'em get ya."
  translation: "Всё хорошо, тётя Сара здесь. Я не дам им тебя обидеть."

- text: "I think that's actually working."
  translation: "Кажется, это и правда работает."

- text: "Of course it is! Look! It's not scared anymore!"
  translation: "Конечно работает! Смотри! Он больше не боится!"

- text: "Hell hath no fury like Auntie Sarah."
  translation: "Нет ярости страшнее тёти Сары."

