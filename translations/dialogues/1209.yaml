- text: "Please! All I need is a tiny favor. I'll never ask anything of you again, I promise! They'll rip her apart, please!"
  translation: "Прошу! Мне нужна лишь маленькая услуга. Я больше никогда ни о чём тебя не попрошу, обещаю! Они разорвут её на части, пожалуйста!"

