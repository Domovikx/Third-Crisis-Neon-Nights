# Dialogues (path_id=73836)

- text: "Like that over there! But wait... that's not it."
  translation: "Вроде вон того! Хотя нет, постой... это не он."

- text: "Hm... I'll take a look. Gonna put any nearby unattended phones into lost and found mode to help triangulate it."
  translation: "Хм... сейчас гляну. Переключу все бесхозные телефоны поблизости в режим утери — это поможет его засечь."

- text: "Uhh... how are you gonna do that?"
  translation: "Эээ... и как ты это сделаешь?"

- text: "This ain't my first time finding a lost phone. The more I find, the easier it'll be to find yours."
  translation: "Не в первый раз ищу пропавший телефон. Чем больше найду, тем проще будет отыскать твой."

- text: "Uhh- Okay. I trust you! If you find my phone, I'll give you some fuckbucks for your troubles."
  translation: "Эээ- Ладно. Я тебе доверяю! Если найдёшь мой телефон, кину пару факбаксов за труды."

