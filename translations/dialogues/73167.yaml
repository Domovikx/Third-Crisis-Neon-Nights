# Dialogues (path_id=73167)

- text: "I am the Train Man! Hear my words of wisdom if you wish to survive this perilous train ride!"
  translation: "Я — Человек-Поезд! Внемли моим мудрым словам, если хочешь пережить эту опасную поездку!"
  speaker: "Man"

- text: "Right... What sort of wisdom do you have for me?"
  translation: "Ага... И что же за мудрость ты мне поведаешь?"
  speaker: "Zoey"

- text: "Come closer."
  translation: "Подойди ближе."
  speaker: "Man"

- text: "Uh huh."
  translation: ""

- text: "No, no. Closer than that."
  translation: "Нет, нет. Ещё ближе."
  speaker: "Man"

- text: "I'm already pretty close!"
  translation: "Я уже довольно близко!"

- text: "Are you ready?"
  translation: "Готова?"
  speaker: "Man"

- text: "Just walk to the right until you can't anymore."
  translation: "Просто иди направо, пока не упрёшься."
  speaker: "Man"

