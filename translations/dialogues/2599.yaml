# Dialogues (path_id=2599)

- text: "Oh- Pardon my manners, I'm Zoey."
  translation: "О- Простите мою невоспитанность, я Зои."

- text: "This one's designation is Cypher. It is agreeable to make your acquaintance, Zoey."
  translation: "Данный субъект именуется Сайфер. Приятно познакомиться, Зои."

- text: "Nice to meet you too?"
  translation: "Мне тоже приятно?"

- text: "But now this one must depart. There is little time."
  translation: "Но теперь данный субъект должен удалиться. Осталось мало времени."

- text: "Oh- Right. You'll want to get fully charged up at a working station?"
  translation: "А- Да. Тебе нужно полностью зарядиться на рабочей станции?"
  speaker: "Zoey"

- text: "No, th- Yes. This one needs a full charge for what lays ahead."
  translation: "Нет, э- Да. Данному субъекту нужна полная зарядка для того, что впереди."

- text: "What lays ahead? Are you okay?"
  translation: "Что впереди? Ты в порядке?"

- text: "This one will be fine. Your assistance was appreciated, Zoey. This one is hopeful our paths cross again in the future."
  translation: "Данный субъект будет в порядке. Ваша помощь была оценена, Зои. Данный субъект надеется, что наши пути пересекутся вновь."

- text: "Oh- Uh, yeah. See ya around then, Cypher."
  translation: "О- Эм, да. Увидимся, Сайфер."

