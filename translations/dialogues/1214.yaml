# Dialogues (path_id=1214)

- text: "Ah-...! H-hi...! Uhmm..."
  translation: "А-а...! П-привет...! Эм-м..."

- text: "You're Klark, right? Zoey told me all about you."
  translation: "Ты Кларк, верно? Зои мне всё о тебе рассказала."

- text: "She did...? Hah-... Uhm... L-look, I-... I'm sorry that-... Like..."
  translation: "Рассказала...? Ха-... Эм... С-слушай, я-... Прости, что-... Ну..."

- text: "She also told me about your girlfriend. The Cartel said that they will tear her apart? I've heard about them selling Andro parts in the past."
  translation: "Она рассказала про твою девушку. Картель сказал, что разберут её на части? Я слышала, они торговали деталями Андро."

- text: "They will for sure now... I'm sorry for recording your customers, but it was the only way I could do to keep them at bay so far..."
  translation: "Теперь точно... Прости, что записывал твоих клиентов, но это был единственный способ держать их в узде..."

- text: "I might have an idea on how to help without intruding on my customers!"
  translation: "У меня есть идея, как помочь и не трогать моих клиентов!"

- text: "Help? You- you would help... Me?"
  translation: "Помочь? Ты- ты поможешь... Мне?"

- text: "You would?"
  translation: "Правда?"

- text: "Can't just abandon his Andro girl, now can we?"
  translation: "Не бросать же его девушку-андро, верно?"

- text: "Thank you so much! But what's your idea?"
  translation: "Спасибо огромное! Но какая у тебя идея?"

- text: "Let's just say... I've had some customers who might be interested in an... Arrangement like this."
  translation: "Скажем так... У меня есть клиенты, которым может быть интересна... подобная договорённость."

- text: "Wait... Really? They would?"
  translation: "Подожди... Правда? Им бы такое?"

- text: "The things some customers ask for. You have no idea, ehehe."
  translation: "О чём только клиенты не просят. Ты и не представляешь, хе-хе."

- text: "(Recorded while being massaged...? Isn't that kinda... Private...?)"
  translation: "(Записывать клиентов во время массажа...? Не слишком это... Личное...?)"
  speaker: "Zoey"
  rich_text: "<i>(Recorded while being massaged...? Isn't that kinda... Private...?)</i>"
  rich_translation: "<i>(Записывать клиентов во время массажа...? Не слишком это... Личное...?)</i>"

- text: "You would really help me after what I've done...? Thank you so much."
  translation: "Ты правда поможешь после того, что я натворил...? Спасибо огромное."

- text: "Your girlfriend is clearly in trouble and I can help, so why wouldn't I."
  translation: "Твоя девушка в беде, а я могу помочь — так почему бы и нет."

- text: "Just promise to never record my customers without my permission again."
  translation: "Просто пообещай больше никогда не записывать моих клиентов без разрешения."

- text: "I promise!"
  translation: "Обещаю!"

- text: "Would you mind watching over it, Zoey? Just to make sure nobody is unintentionally being recorded."
  translation: "Не присмотришь за этим, Зои? Чтобы никто случайно не оказался записан."

- text: "Would that be okay? I would feel a lot better if you would make sure everything is going well behind the scenes."
  translation: "Ты согласна? Мне было бы спокойнее, если бы ты убедилась, что всё идёт как надо."

- text: "R-right... Yeah, I guess I can uhm... help out."
  translation: "Д-да... Ну, наверное, я могу эм... помочь."
  speaker: "Zoey"

- text: "Then that's cleared up. I'll call up a special customer of mine. Maybe he's interested in coming in today."
  translation: "Тогда договорились. Я позвоню одному особенному клиенту. Может, захочет прийти сегодня."

- text: "He's been begging me to do some more... involved... sessions with him anyways. I think they would be just what you need."
  translation: "Он всё равно упрашивает меня провести более... интимные... сеансы. Думаю, они тебе пригодятся."

- text: "Mhmm. He's been begging me to record and call him names. Something about an \"Andro superiority\" fetish. Was thinking of trying it anyways, so why not use the opportunity."
  translation: "М-мм. Он умоляет записывать и обзывать его. Фетиш про \"превосходство андро\". Я всё равно хотела попробовать, так почему не воспользоваться."

- text: "Andro superiority? Huh. Talk about role-reversal."
  translation: "Превосходство андро? Хм. Вот это смена ролей."
  speaker: "Zoey"

- text: "I know, right? Hehehe."
  translation: "Вот именно, да? Хе-хе-хе."

- text: "Thank you so much, Max. I really owe you."
  translation: "Спасибо огромное, Макс. Я у тебя в долгу."

- text: "Heh. You really do..."
  translation: "Хех. Это уж точно..."

