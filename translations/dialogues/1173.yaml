# Dialogues (path_id=1173)

- text: "I'd like to know more about you."
  translation: "Я бы хотела узнать о тебе побольше."

- text: "Oh you're a real flirt, huh~?"
  translation: "Ой, да ты кокетка, да~?"

- text: "Wait- I didn't mean it like that!"
  translation: "Погоди- я не это имела в виду!"

- text: "Ohoho, just teasing, dear~ Look how red you are~!"
  translation: "Охохо, просто дразню, дорогая~ Ты такая красная~!"

- text: "dying inside"
  translation: "умираю внутри"

- text: "like you're introducing yourself to a group of people"
  translation: "как будто представляешься перед толпой"

- text: "Oh! That's- Nice?"
  translation: "О! Это- Мило?"

- text: "I think so too! Oh, and obviously I'm a huge bitch for nice nails. Why else would I work for a place that does the best nails in the city?"
  translation: "Я тоже так считаю! О, и я, конечно, та ещё сучка, когда дело касается красивых ногтей. Зачем бы ещё я работала в месте, где делают лучшие ногти в городе?"

- text: "Well your nails are super nice!"
  translation: "Что ж, у тебя просто шикарные ногти!"

- text: "you realized you accidentally made a pun like how i just realized it while writing this"
  translation: "ты поняла, что случайно сделала каламбур, как и я только что понял это, когда писал этот текст"

- text: "Thank you!"
  translation: "Спасибо!"

- text: "Anytime, sweetheart. Lemme know if you need any help with things."
  translation: "Всегда пожалуйста, милая. Обращайся, если понадобится помощь."

