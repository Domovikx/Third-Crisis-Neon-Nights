# Dialogues (path_id=2531)

- text: "Ah-! My shirt!"
  translation: "А-а! Моя рубашка!"

- text: "This thing is just taking us in circles!"
  translation: "Эта штука просто водит нас кругами!"

- text: "We got the attention of the guards now though!"
  translation: "Зато мы привлекли внимание охранников!"

- text: "Is that really a good thing now?!"
  translation: "И это сейчас хорошо?!"

- text: "I think so?!"
  translation: "Наверное?!"

