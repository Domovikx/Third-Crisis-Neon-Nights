# Dialogues (path_id=140)

- text: "Your jacket is in the way of my official business. It has to go. Now."
  translation: "Твоя куртка мешает моей официальной работе. Снимай. Сейчас."
  speaker: "Enforcer"

- text: "Just-... Just the jacket. O-okay."
  translation: "Только-... Только куртку. Л-ладно."

- text: "Mix of annoyed and insecure."
  translation: "Смесь раздражения и неуверенности."

- text: "That's better."
  translation: "Уже лучше."

