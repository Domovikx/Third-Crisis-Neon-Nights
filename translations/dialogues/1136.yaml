# Dialogues (path_id=1136)

- text: "Here you go, hun!"
  translation: "Вот, держи, милый!"

- text: "Thanks, Rosie!"
  translation: "Спасибо, Рози!"

- text: "Oh! Varen usually asks for some company along with his drink. He's not the worst really. Just likes to have a bit of bunny in his hands."
  translation: "О! Варен обычно заказывает к выпивке ещё и компанию. Не самый плохой, на самом деле. Просто любит подержать в руках зайку."

- text: "Oh- o-okay... So-... Do I-"
  translation: "О- о-ладно... Т-... мне надо..."

- text: "D'aww look at you glow! You're adorable!"
  translation: "Ой, да ты вся сияешь! Прелесть!"

- text: "Beyond being a bit handsy, Varen just enjoys the views around here. Doesn't ask for service bunnies for some reason."
  translation: "Кроме того, что он любит распустить руки, Варену тут просто нравятся виды. Почему-то не просит зайку для услуг."

- text: "In the end, it's your choice, darling. The more you do, the more customers pay. Within the rules of course, eheh!"
  translation: "В конце концов, это твой выбор, дорогая. Чем больше делаешь, тем больше платят клиенты. В рамках правил, конечно, хе-хе!"

- text: "Right, yeah... I-... I guess that makes sense. Thanks."
  translation: "Да, точно... Я-... наверное, в этом есть смысл. Спасибо."

