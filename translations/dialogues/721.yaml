# Dialogues (path_id=721)

- text: "Jesus, Zoey. What the hell is this thing?"
  translation: "Господи, Зои. Что это за хрень?"

- text: "It's just uh... a uh..."
  translation: "Это просто эм... эм..."

- text: "Trying to coax her into saying what it is."
  translation: "Пытается выудить из неё, что это."

