# Dialogues (path_id=2545)

- text: "Are you sure about using the box, Sarah?"
  translation: "Ты уверена насчёт ящика, Сара?"

- text: "Oh, come on, you big baby! It'll be fun!"
  translation: "Ой, да ладно, трусиха! Будет весело!"

- text: "We can also just wait if you want. Your choice."
  translation: "Можем и просто подождать, если хочешь. Тебе решать."

