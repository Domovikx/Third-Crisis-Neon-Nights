# Dialogues (path_id=-4513733326656519009)

- text: "Wow, your nails look amazing!"
  translation: "Вау, у тебя ногти шикарные!"

- text: "Right~? I had a ton of fun putting these ones together. I prefer to do it myself instead of using the machines."
  translation: "Правда~? Обожаю собирать дизайны сама. Предпочитаю делать всё вручную, а не машинками."

- text: "You did that without a machine?"
  translation: "Ты сама, без машинки?"

- text: "Yup! I could show ya how sometime if you like."
  translation: "Ага! Могу как-нибудь показать, если хочешь."

- text: "That sounds like a blast!"
  translation: "Будет весело!"

