# Dialogues (path_id=1229)

- text: "Terminal? No-...! Wait!"
  translation: "Терминал? Нет-...! Подожди!"
  speaker: "Zoey"

- text: "Huh? Wait for what?"
  translation: "А? Чего ждать?"

- text: "I-... I don't mean to... bother you!"
  translation: "Я-... я не хотела... беспокоить тебя!"
  speaker: "Zoey"

- text: "Oh Zoey, you're just too sweet, ehehe!"
  translation: "Ох, Зои, ты такая милая, хе-хе!"

- text: "Fine. How about you come and visit me some time after I close shop for the day, hm? I could show you all you want to know about my machines."
  translation: "Ладно. Заглядывай ко мне как-нибудь после закрытия, а? Я покажу тебе всё, что захочешь узнать о моих машинках."

