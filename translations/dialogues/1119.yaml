# Dialogues (path_id=1119)

- text: "Curse this place! Curse this establishment! Curse any who would stand in the way of Mark's true love!"
  translation: "Прокляну это место! Прокляну это заведение! Прокляну любого, кто встанет на пути истинной любви Марка!"

- text: "Uhhh. You doing okay, buddy?"
  translation: "Э-э-э. Ты в порядке, приятель?"

- text: "Heavens no! That accursed Klaudia has barred me from entering the Afterglow bar over yonder!"
  translation: "Боже упаси! Эта проклятая Клавдия не пускает меня в бар Afterglow вон там!"

- text: "The one up the hall? Why is that a problem?"
  translation: "Тот, что в конце коридора? И в чём проблема?"

- text: "The very same! She intends to keep me from my beloved! My Jasmine! My one true love! My reason for being!"
  translation: "Та самая! Она хочет разлучить меня с моей возлюбленной! С моей Жасмин! С моей единственной настоящей любовью! Со смыслом моей жизни!"

- text: "Jasmine. That sorta name makes it sound like she works here."
  translation: "Жасмин. Из-за такого имени кажется, будто она тут работает."

- text: "But of course! We had but a minor fling, a fleeting throe of passion! Our hearts- nay, our souls connected!"
  translation: "Разумеется! У нас был лишь мимолётный роман, мимолётный всплеск страсти! Наши сердца... нет, наши души соединились!"

- text: "You... had sex?"
  translation: "Ты... с ней переспал?"

- text: "Gah! Such a meaningless word for a worthless pursuit! Nay, our passion went beyond the confines of our mortal bodies."
  translation: "Га! Какое бессмысленное слово для ничтожного занятия! Нет, наша страсть вышла за пределы наших смертных тел!"

- text: "Just one glance and we knew. Knew that our lives would forever be intertwined from that moment forward."
  translation: "Достаточно было одного взгляда, и мы оба поняли. Поняли, что наши жизни навеки переплетутся с той минуты."

- text: "So... you just made eye contact with her?"
  translation: "Так... ты просто встретился с ней взглядом?"

- text: "Have you not heard of love at first sight?! Gah, a mere mortal like you couldn't possibly begin to understand."
  translation: "Ты что, никогда не слышал о любви с первого взгляда?! Эх, простой смертный вроде тебя даже близко не способен этого постичь."

- text: "And that was enough to get you thrown out?"
  translation: "И этого хватило, чтобы тебя вышвырнули?"

- text: "Only a vile woman like Klaudia would dare to stand in the way of our love. Once she heard what happened, she cast me out!"
  translation: "Только такая мерзкая баба, как Клавдия, осмелилась бы встать на пути нашей любви. Стоило ей узнать, что произошло, как она меня вышвырнула!"

- text: "Say, kind stranger. Would you do me a kindness? Please go up and find my Jasmine. Let me know if she's still in there."
  translation: "Слушай, добрый незнакомец. Не окажешь мне услугу? Пожалуйста, поднимись и найди мою Жасмин. Дай знать, если она ещё там."

- text: "What's in it for me?"
  translation: "А что мне с этого будет?"

- text: "Why, I have fuckbucks of course! Plenty of fuckbucks to spare since SOMEONE won't allow me in to spend them anymore!"
  translation: "Разумеется, у меня есть факбаксы! Целая гора факбаксов, некуда девать, раз КОЕ-КТО не пускает меня внутрь, чтобы их потратить!"

- text: "So how about it? Will you help me with Jasmine?"
  translation: "Ну как, поможешь мне с Жасмин?"

