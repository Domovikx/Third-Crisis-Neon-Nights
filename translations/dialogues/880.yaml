# Dialogues (path_id=880)

- text: "You're new here."
  translation: "Ты здесь новенькая."
  speaker: "Rugnar"

- text: "Y-yes, I am. I just recently... joined."
  translation: "Д-да, я... Совсем недавно устроилась."
  speaker: "Zoey"

- text: "Good. Place needs bunnies."
  translation: "Хорошо. Тут нужны кролики."
  speaker: "Rugnar"

- text: "Uhm. Right. Soo..."
  translation: "Эм. Да. Ну-у..."
  speaker: "Zoey"

- text: "What would you like to order, sir?"
  translation: "Что будете заказывать, сэр?"
  speaker: "Zoey"

- text: "Neon Lime."
  translation: "Неон Лайм."
  speaker: "Rugnar"

- text: "Neon Lime, coming right up!"
  translation: "Неон Лайм, сию секунду!"
  speaker: "Zoey"

- text: "Pretty smile."
  translation: "Красивая улыбка."
  speaker: "Rugnar"

- text: "Oh-! I... Thanks!"
  translation: "Ой-! Я... Спасибо!"

- text: "I erm... I'll be on my way then!"
  translation: "Я эм... Тогда я пойду!"
  speaker: "Zoey"

